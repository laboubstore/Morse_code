        };

        window.playModalSentence = function(s) {
            isPlaying = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const T = dotDuration;
            let startTime = audioCtx.currentTime;
            let visualEvents = [];
            let accumulatedTime = 0;
            
            const tapeContent = document.getElementById('modal-tape-content');
            const scrollContainer = document.getElementById('modal-tape-scroll');
            const statusBar = document.getElementById('modal-status-bar');
            const replayBtn = document.getElementById('modal-replay-btn');

            s.words.forEach((wordObj, wIdx) => {
                visualEvents.push({ t: accumulatedTime, type: 'word-start', wIdx: wIdx, text: `الكلمة: ${wordObj.chars.join('')}` });
                
                wordObj.codes.forEach((codeStr, lIdx) => {
                    let letterStartTime = accumulatedTime;
                    
                    for(let i=0; i<codeStr.length; i++) {
                        let isDash = codeStr[i] === '-';
                        let duration = isDash ? T * 3 : T;
                        let elId = `led-m-${wIdx}-${lIdx}-${i}`;
                        
                        playTone(700, duration, startTime + accumulatedTime);
                        visualEvents.push({t: accumulatedTime, type: 'on', el: elId});
                        visualEvents.push({t: accumulatedTime + duration, type: 'off', el: elId});
                        
                        accumulatedTime += duration;
                        if (i < codeStr.length - 1) accumulatedTime += T; 
                    }
                    
                    let letterEndTime = accumulatedTime;
                    visualEvents.push({t: letterStartTime, type: 'on-char', el: `char-m-${wIdx}-${lIdx}`});
                    visualEvents.push({t: letterEndTime, type: 'off-char', el: `char-m-${wIdx}-${lIdx}`});

                    if (lIdx < wordObj.codes.length - 1) {
                        for(let k=0; k<3; k++) {
                            visualEvents.push({t: accumulatedTime + (k*T), type: 'on', el: `ghost-m-${wIdx}-${lIdx}-${k}`});
                            visualEvents.push({t: accumulatedTime + ((k+1)*T), type: 'off', el: `ghost-m-${wIdx}-${lIdx}-${k}`});
                        }
                        accumulatedTime += T * 3;
                    }
                });
                
                if (wIdx < s.words.length - 1) {
                    visualEvents.push({ t: accumulatedTime, type: 'sep-start', wIdx: wIdx, text: 'مسافة 7 نقاط...' });
                    for(let k=0; k<7; k++) {
                        visualEvents.push({t: accumulatedTime + (k*T), type: 'on', el: `ghost-w-m-${wIdx}-${k}`});
                        visualEvents.push({t: accumulatedTime + ((k+1)*T), type: 'off', el: `ghost-w-m-${wIdx}-${k}`});
                    }
                    accumulatedTime += T * 7;
                }
            });
            
            visualEvents.push({ t: accumulatedTime + (T * 3), type: 'audio-end' });

            function sync() {
                if (!isPlaying) return; 

                const now = audioCtx.currentTime - startTime;
                for (let i = 0; i < visualEvents.length; i++) {
                    const e = visualEvents[i];
                    if (!e.done && now >= e.t) {
                        if (e.type === 'on' || e.type === 'off') {
                            const el = document.getElementById(e.el);
                            if (el) {
                                if (e.type === 'on') el.classList.add('active');
                                else el.classList.remove('active');
                            }
                        } else if (e.type === 'on-char' || e.type === 'off-char') {
                            const el = document.getElementById(e.el);
                            if (el) {
                                if (e.type === 'on-char') el.classList.add('playing-char');
                                else el.classList.remove('playing-char');
                            }
                        } else if (e.type === 'word-start' || e.type === 'sep-start') {
                            if(statusBar && e.text) { 
                                statusBar.innerText = e.text; 
                                statusBar.style.background = e.type === 'word-start' ? 'var(--active-glow)' : 'var(--giveup)'; 
                            }
                            if(tapeContent) {
                                const words = tapeContent.querySelectorAll('.tape-word-block');
                                const seps = tapeContent.querySelectorAll('.word-separator-block');
                                words.forEach(w => w.classList.remove('active-word'));
                                seps.forEach(s => s.classList.remove('active-word'));
                                
                                let targetBlockId = e.type === 'word-start' ? `word-block-m-${e.wIdx}` : `sep-block-m-${e.wIdx}`;
                                let targetBlock = document.getElementById(targetBlockId);
                                
                                if(targetBlock) {
                                    targetBlock.classList.add('active-word');
                                    
                                    // النقلة الحاسمة والمثالية للتوسيط الدقيق في الشاشة 
                                    if(scrollContainer) {
                                        const blockRect = targetBlock.getBoundingClientRect();
                                        const containerRect = scrollContainer.getBoundingClientRect();
                                        const offset = scrollContainer.scrollLeft + blockRect.left - containerRect.left - (containerRect.width / 2) + (blockRect.width / 2);
                                        scrollContainer.scrollTo({ left: offset, behavior: 'smooth' });
                                    }
                                }
                            }

                        } else if (e.type === 'audio-end') {
                            if(statusBar) { statusBar.innerText = 'انتهت الرسالة! 🎉'; statusBar.style.background = 'var(--blue)'; }
                            if(tapeContent) {
                                tapeContent.querySelectorAll('.tape-word-block, .word-separator-block').forEach(b => b.classList.remove('active-word'));
                                tapeContent.querySelectorAll('.tape-char').forEach(c => c.classList.remove('playing-char'));
                            }
                            if(replayBtn) replayBtn.style.display = 'block';
                            isPlaying = false;
                        }
                        e.done = true;
                    }
                }

                if (now < accumulatedTime + 0.1 + (T*3) && isPlaying) {
                    requestAnimationFrame(sync);
                } else {
                    isPlaying = false;
                }
            }
            sync();
        };

// 1. المترجم الفوري (توليد الشريط اللحظي)
        window.generateLiveTape = function(text) {

// 2. الكشاف الضوئي المطور
        window.isFlashlightActive = false;

        window.changeFlashSpeed = function(val) {

            setTimeout(() => {
                window.startFlashlightMode(true); // تشغيل في وضع الإعادة
            }, 100);
        };

        window.startFlashlightMode = function(isReplay = false) {
            let text = "";
            if (isReplay) {
                text = window.currentFlashText;
            } else {
                text = document.getElementById('flash-text-input').value.trim().toUpperCase();
                window.currentFlashText = text;
            }
            
            if(!text) return;
            
            window.isFlashlightActive = true;
            document.getElementById('flashlight-modal-overlay').style.display = 'flex';
            
            let bulb = document.getElementById('main-flash-bulb');
            let status = document.getElementById('flash-status');
            let currentWordDisplay = document.getElementById('flash-current-word');
            let replayBtn = document.getElementById('flash-replay-btn');
            let speedSlider = document.getElementById('flash-speed-slider');
            
            // مزامنة شريط السرعة الخاص بالكشاف مع المتغير العام
            const mainSlider = document.querySelector('.bottom-control-container input[type=range]');
            if(mainSlider && speedSlider) speedSlider.value = mainSlider.value;
            
            if (replayBtn) replayBtn.style.display = 'none'; // إخفاء زر الإعادة أثناء التشغيل
            
            // تقسيم النص إلى كلمات ثم حروف لمعرفة الكلمة الحالية بدقة
            let wordsArray = text.split(' ').filter(w => w.length > 0);
            
            async function runFlash() {
                for(let wIdx = 0; wIdx < wordsArray.length; wIdx++) {
                    if(!window.isFlashlightActive) break;
                    
                    let word = wordsArray[wIdx];
                    if (currentWordDisplay) currentWordDisplay.innerText = word; // عرض الكلمة الحالية كاملة
                    
                    for(let i=0; i<word.length; i++) {
                        if(!window.isFlashlightActive) break;
                        
                        let char = word[i];
                        let s = stories.find(x => x.char === char) || numberStories.find(x => x.char === char);
                        
                        if(s) {
                            if (status) status.innerText = s.char; // عرض الحرف الحالي فقط
                            
                            for(let sym of s.seqStr) {
                                if(!window.isFlashlightActive) break;
                                
                                // السحر هنا: حساب السرعة (T) داخل الحلقة لتستجيب لتغيرات الشريط لحظياً!
                                let T = dotDuration * 1000; 
                                let duration = sym === '.' ? T : T * 3;
                                
                                playTone(1000, 0.05, audioCtx.currentTime); 
                                bulb.classList.add('glow');
                                await new Promise(r => setTimeout(r, duration));
                                
                                bulb.classList.remove('glow');
                                // مسافة صمت داخل الحرف (نقطة واحدة)
                                await new Promise(r => setTimeout(r, dotDuration * 1000)); 
                            }
                            // مسافة بين الحروف (3 نقاط) - خصمنا نقطة صمت سابقة، ننتظر الباقي (نقطتين)
                            await new Promise(r => setTimeout(r, (dotDuration * 1000) * 2)); 
                        }
                    }
                    
                    // مسافة بين الكلمات (7 نقاط) إذا لم تكن الكلمة الأخيرة
                    if (wIdx < wordsArray.length - 1 && window.isFlashlightActive) {
                        if (status) status.innerText = 'مسافة بين الكلمات';
                        // انتظرنا 3 نقاط بعد آخر حرف، متبقي 4 نقاط لتكتمل الـ 7
                        await new Promise(r => setTimeout(r, (dotDuration * 1000) * 4)); 
                    }
                }
                
                if(window.isFlashlightActive) {
                    if (status) status.innerText = "END";
                    if (currentWordDisplay) currentWordDisplay.innerText = "تمت المهمة بنجاح ✨";
                    if (replayBtn) replayBtn.style.display = 'block'; // إظهار زر الإعادة بأسلوب مبهر
                    window.isFlashlightActive = false; // إنهاء الدورة
                }
            }
            
            // تهيئة العرض بلمسة تشويقية قبل البدء
            if (status) status.innerText = "استعد...";
            if (currentWordDisplay) currentWordDisplay.innerText = "يتم الاتصال...";
            setTimeout(runFlash, 1200); // مهلة قصيرة لإعطاء إحساس بالمهمة
        };
        
        window.stopFlashlightMode = function(e) {

            document.getElementById('flashlight-modal-overlay').style.display = 'none';

// --- نظام بث أمواج الراديو (Oscilloscope) ---
        window.isRadioActive = false;
        window.radioAnimFrame = null;
        
        window.stopRadioBroadcast = function(e) {
            if(e) { e.preventDefault(); if(e.stopPropagation) e.stopPropagation(); }
            window.isRadioActive = false;
            if (window.radioAnimFrame) cancelAnimationFrame(window.radioAnimFrame);
            
            const stopBtn = document.getElementById('radio-stop-btn');
            const startBtn = document.getElementById('radio-start-btn');
            if(stopBtn) stopBtn.style.display = 'none';
            if(startBtn) startBtn.style.display = 'inline-block';
            
            const statusText = document.getElementById('radio-status-text');
            if(statusText) {
                statusText.innerText = 'STANDBY';
                statusText.style.color = '#00ff00';
            }
            
            // إعادة رسم الخط الثابت
            const canvas = document.getElementById('radio-canvas');
            if(canvas) {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.moveTo(0, canvas.height/2);
                ctx.lineTo(canvas.width, canvas.height/2);
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#00ff00';

        window.startRadioBroadcast = function() {
            let text = document.getElementById('radio-text-input').value.trim().toUpperCase();
            if(!text) return;

            window.isRadioActive = true;
            document.getElementById('radio-start-btn').style.display = 'none';
            document.getElementById('radio-stop-btn').style.display = 'inline-block';
            
            const statusText = document.getElementById('radio-status-text');
            statusText.innerText = 'TRANSMITTING...';
            statusText.style.color = '#ff3333';
            
            const charDisplay = document.getElementById('radio-current-char');
            charDisplay.innerText = "جاري الاتصال بالتردد...";

            const canvas = document.getElementById('radio-canvas');
            const ctx = canvas.getContext('2d');
            // ضبط الدقة لتتناسب مع الشاشة وتمنع التشويش
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            let wordsArray = text.split(' ').filter(w => w.length > 0);
            let currentSignalState = 0; // 0 = مسافة/صمت, 1 = نبضة نشطة
            
            // حلقة الأنيميشن (Animation Loop) الساحرة
            let timeOffset = 0;
            function drawWave() {
                if (!window.isRadioActive) return;
                
                // تأثير تلاشي الذيل (Trailing effect)
                ctx.fillStyle = 'rgba(17, 17, 17, 0.2)'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.beginPath();
                ctx.lineWidth = 3;
                
                if (currentSignalState === 1) {
                    ctx.strokeStyle = '#00ff00';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ff00';
                } else {
                    ctx.strokeStyle = '#225522';
                    ctx.shadowBlur = 2;
                    ctx.shadowColor = '#225522';
                }

                // الارتفاع والتردد يتغيران حسب حالة الإشارة
                let amplitude = currentSignalState === 1 ? (canvas.height / 2) - 15 : 2;
                let frequency = currentSignalState === 1 ? 0.3 : 0.05;

                ctx.moveTo(0, canvas.height / 2);
                for (let x = 0; x < canvas.width; x++) {
                    let y = (canvas.height / 2) + Math.sin(x * frequency + timeOffset) * amplitude;
                    // إضافة تشويش كهربائي بسيط واقعي عند الإرسال
                    if (currentSignalState === 1) {
                         y += (Math.random() - 0.5) * 8;
                    }
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
                timeOffset -= 0.6; // سرعة تدفق الموجة
                
                window.radioAnimFrame = requestAnimationFrame(drawWave);
            }
            
            if (window.radioAnimFrame) cancelAnimationFrame(window.radioAnimFrame);
            drawWave();

            // المزامنة بين الصوت والرسم
            async function runTransmission() {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                for(let wIdx = 0; wIdx < wordsArray.length; wIdx++) {
                    if(!window.isRadioActive) break;
                    let word = wordsArray[wIdx];
                    
                    for(let i=0; i<word.length; i++) {
                        if(!window.isRadioActive) break;
                        let char = word[i];
                        charDisplay.innerText = `يتم إرسال: ${char}`;
                        
                        let s = stories.find(x => x.char === char) || numberStories.find(x => x.char === char);
                        if(s) {
                            for(let sym of s.seqStr) {
                                if(!window.isRadioActive) break;
                                
                                let T = dotDuration * 1000; 
                                let duration = sym === '.' ? T : T * 3;
                                
                                currentSignalState = 1; // رفع الموجة
                                playTone(700, duration / 1000, audioCtx.currentTime); 
                                
                                await new Promise(r => setTimeout(r, duration));
                                
                                currentSignalState = 0; // تسطيح الموجة
                                await new Promise(r => setTimeout(r, dotDuration * 1000)); 
                            }
                            // مسافة بين الحروف
                            await new Promise(r => setTimeout(r, (dotDuration * 1000) * 2)); 
                        }
                    }
                    
                    // مسافة بين الكلمات
                    if (wIdx < wordsArray.length - 1 && window.isRadioActive) {
                        charDisplay.innerText = "فراغ بين الكلمات...";
                        await new Promise(r => setTimeout(r, (dotDuration * 1000) * 4)); 
                    }
                }
                
                if(window.isRadioActive) {
                    charDisplay.innerText = "انتهى البث بنجاح 📡";
                    setTimeout(() => window.stopRadioBroadcast(null), 1000);
                }
            }
            
            // تأخير بسيط لإعطاء إحساس ببدء تشغيل الجهاز
            setTimeout(runTransmission, 600);
        };

        // 3. التلغراف اليدوي الذكي (Tapper)
        window.tapStartTime = 0;

        window.tapperTimeout = null;

        window.clearTapper = function() {
            window.tapBuffer = "";
            document.getElementById('tapper-char-preview').innerText = "";
            document.getElementById('tapper-code-preview').innerHTML = "";
            document.getElementById('tapper-final-output').innerText = "";
        };

        window.tapperAddSpace = function() {
            let outBox = document.getElementById('tapper-final-output');
            if(outBox && outBox.innerText.length > 0 && !outBox.innerText.endsWith("\u00A0")) {
                outBox.innerText += "\u00A0"; // اضافة مسافة حقيقية لا يتم تجاهلها
            }
        };

        window.tapperBackspace = function() {
            let outBox = document.getElementById('tapper-final-output');
            if(outBox && outBox.innerText.length > 0) {
                outBox.innerText = outBox.innerText.slice(0, -1);
            }
            window.tapBuffer = "";
            window.updateTapperPreview();
        };

        window.processTapperCode = function() {
            if(window.tapBuffer === "") return;
            let decodedChar = window.decodeDict[window.tapBuffer] || "?";
            let outBox = document.getElementById('tapper-final-output');
            if(outBox) outBox.innerText += decodedChar;
            
            window.tapBuffer = "";
            let charPreview = document.getElementById('tapper-char-preview');
            let codePreview = document.getElementById('tapper-code-preview');
            if(charPreview) charPreview.innerText = "";
            if(codePreview) codePreview.innerHTML = "";
            
            if(decodedChar !== "?") { playTone(880, 0.1, audioCtx.currentTime); }
            else { playTone(150, 0.2, audioCtx.currentTime); }
        };

           window.updateTapperPreview = function() {
            let codePreview = document.getElementById('tapper-code-preview');
            let charPreview = document.getElementById('tapper-char-preview');
            
            if(codePreview) {
                let codeHtml = window.tapBuffer.split('').map(sym => `<div class="${sym==='.'?'dot':'dash'}" style="background:var(--red);"></div>`).join('');
                codePreview.innerHTML = codeHtml;
            }

            if(charPreview) {
                // إظهار الحرف بوضوح، وإذا كان الرمز غير مكتمل أو خاطئ نعرض علامة استفهام ليكون واضحاً للمستخدم
                if (window.tapBuffer === "") {
                    charPreview.innerText = "";
                } else {
                    charPreview.innerText = window.decodeDict[window.tapBuffer] || "?";
                }
            }
        };

        window.tapperDown = function(e) {
            if(e) { e.preventDefault(); if(e.stopPropagation) e.stopPropagation(); }
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const tapBtn = document.getElementById('manual-tapper-btn');
            if(tapBtn) tapBtn.classList.add('active-tap');
            
            window.tapStartTime = Date.now();
            startContinuousTone(700);
            clearTimeout(window.tapperTimeout);
        };

        window.tapperUp = function(e) {
            if(e) { e.preventDefault(); if(e.stopPropagation) e.stopPropagation(); }
            const tapBtn = document.getElementById('manual-tapper-btn');
            if(tapBtn) tapBtn.classList.remove('active-tap');
            
            stopContinuousTone();
            
            if(window.tapStartTime === 0) return;
            
            let duration = Date.now() - window.tapStartTime;
            window.tapStartTime = 0;
            
            if(duration < 200) window.tapBuffer += ".";
            else window.tapBuffer += "-";
            
            window.updateTapperPreview();
            window.tapperTimeout = setTimeout(window.processTapperCode, 600);
        };

        // دعم لوحة المفاتيح للآلة اليدوية (زر المسطرة = ضغط، زر المسح = حذف)
        document.addEventListener('keydown', function(e) {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            
            const tapBtn = document.getElementById('manual-tapper-btn');
            if (tapBtn && tapBtn.getBoundingClientRect().width > 0) { 
                if (e.code === 'Space' && !window.isTapperSpacePressed) {
                    e.preventDefault();
                    window.isTapperSpacePressed = true;
                    window.tapperDown(null);
                }
                if (e.code === 'Backspace') {
                    e.preventDefault();
                    window.tapperBackspace();
                }
            }
        });
        
        document.addEventListener('keyup', function(e) {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            
            const tapBtn = document.getElementById('manual-tapper-btn');
            if (tapBtn && tapBtn.getBoundingClientRect().width > 0) { 
                if (e.code === 'Space') {
                    e.preventDefault();
                    window.isTapperSpacePressed = false;
                    window.tapperUp(null);
                }
            }
        });

        window.decodeSecretMessage = function(morseText) {
            const outBox = document.getElementById('secret-text-output');
            let englishText = "";
            let words = morseText.trim().split(/  +|\//);
            words.forEach(w => {
                let chars = w.trim().split(' ');
                chars.forEach(c => {
                    if(c === "") return;
                    englishText += window.decodeDict[c] || "?";
                });
                englishText += " ";
            });
            if(outBox) outBox.innerText = englishText.trim();
        };

                } else {
                    this.stats = { 
                        textToMorse: { correct: 0, wrong: 0, streak: 0, bestStreak: 0, totalTimeMs: 0, completed: [], remaining: [...this.banks.textToMorse], needsPractice: {} },
                        morseToText: { correct: 0, wrong: 0, streak: 0, bestStreak: 0, totalTimeMs: 0, completed: [], remaining: [...this.banks.morseToText], needsPractice: {} },
                        blind: { correct: 0, wrong: 0, streak: 0, bestStreak: 0, totalTimeMs: 0, completed: [], remaining: [...this.banks.blind], needsPractice: {} },
                        timeAttack: { bestScore: 0, totalPlayed: 0 }
                    };
                    this.saveStats();
                }
            },
            saveStats: function() { localStorage.setItem('morseBankStatsDiamond', JSON.stringify(this.stats)); },
            
            resetAllStats: function() {
                if(confirm("هل أنت متأكد من رغبتك في تصفير مستواك وسجلك بالكامل؟ ستبدأ من الصفر!")) {
                    localStorage.removeItem('morseBankStatsDiamond');
                    this.loadStats(); this.showStats();
                }
            },

            getLevelData: function() {
                let totalCompleted = this.stats.textToMorse.completed.length + this.stats.morseToText.completed.length + this.stats.blind.completed.length;
                if (totalCompleted < 30) return { title: "متدرب لاسلكي", icon: "🥉", color: "#cd7f32", next: 30, pct: (totalCompleted/30)*100, stamp: false };
                if (totalCompleted < 80) return { title: "مشغل ميداني", icon: "🥈", color: "#95a5a6", next: 80, pct: ((totalCompleted-30)/50)*100, stamp: false };
                if (totalCompleted < 140) return { title: "خبير إشارة", icon: "🥇", color: "#f39c12", next: 140, pct: ((totalCompleted-80)/60)*100, stamp: false };
                return { title: "أسطورة التلغراف", icon: "🏆", color: "#e74c3c", next: 150, pct: 100, stamp: true };
            },
            getAcc: function(c, w) { return (c + w === 0) ? 0 : Math.round((c / (c + w)) * 100); },
            getSpeed: function(ms, c) { return (c === 0) ? "0.0" : (ms / c / 1000).toFixed(1); },
            
            renderMenu: function() {
                this.isActive = false; 
                this.stopTimer();
                this.loadStats(); 
                document.getElementById('bank-menu-view').style.display = 'block'; 
                document.getElementById('bank-game-view').style.display = 'none';
                document.getElementById('bank-stats-view').style.display = 'none';
            },
            
            showStats: function() {
                this.loadStats();
                document.getElementById('bank-menu-view').style.display = 'none';
                document.getElementById('bank-game-view').style.display = 'none';
                let statsContainer = document.getElementById('bank-stats-view');
                statsContainer.style.display = 'flex';
                
                let lvl = this.getLevelData();
                let sT2M = this.stats.textToMorse;
                let sM2T = this.stats.morseToText;
                let sBlind = this.stats.blind;
                let sTime = this.stats.timeAttack;

                let badgeSpeed = (sT2M.correct >= 10 && (sT2M.totalTimeMs / sT2M.correct) < 2500) ? 'earned' : '';
                let badgeSniper = (sT2M.bestStreak >= 20 || sM2T.bestStreak >= 20) ? 'earned' : '';
                let badgeBat = (sBlind.correct >= 10) ? 'earned' : '';

                let allPractice = {};
                [sT2M.needsPractice, sM2T.needsPractice, sBlind.needsPractice].forEach(obj => {
                    for(let key in obj) { allPractice[key] = (allPractice[key] || 0) + obj[key]; }
                });
                let weakWords = Object.keys(allPractice).sort((a,b) => allPractice[b] - allPractice[a]).slice(0, 4);

                let html = `<div class="license-card">
                    ${lvl.stamp ? '<div class="stamp-approved">CERTIFIED MASTER</div>' : ''}
                    <div class="license-header">
                        <div style="font-size:3.5rem; margin-bottom:-10px;">${lvl.icon}</div>
                        <h3 class="license-title">${lvl.title}</h3>
                        <div class="level-progress-bar"><div class="level-progress-fill" style="width:${lvl.pct}%; background:${lvl.color};"></div></div>
                        <p style="font-size:0.85rem; color:#666; font-family:'Amiri'; font-weight:bold; margin:0;">الهدف القادم: ${lvl.next} كلمة منجزة</p>
                    </div>

                    <div class="badges-container">
                        <div class="badge-item ${badgeSpeed}"><div class="badge-icon">🏅</div><div class="badge-title">برق (السرعة)</div></div>
                        <div class="badge-item ${badgeSniper}"><div class="badge-icon">🔥</div><div class="badge-title">قناص (الدقة)</div></div>
                        <div class="badge-item ${badgeBat}"><div class="badge-icon">🦇</div><div class="badge-title">خفاش (السمع)</div></div>
                    </div>

                    <div class="stats-grid-4">
                        <div class="stat-box-vintage"><h4>🔠 نص ⬅ شيفرة</h4>
                            <p>أُنجز: ${sT2M.completed.length}/50</p>
                            <p>دقة: ${this.getAcc(sT2M.correct, sT2M.wrong)}%</p>
                            <p>سرعة: ${this.getSpeed(sT2M.totalTimeMs, sT2M.correct)} ث</p>
                        </div>
                        <div class="stat-box-vintage"><h4>🎧 شيفرة ⬅ نص</h4>
                            <p>أُنجز: ${sM2T.completed.length}/50</p>
                            <p>دقة: ${this.getAcc(sM2T.correct, sM2T.wrong)}%</p>
                            <p>متتالية: ${sM2T.bestStreak}</p>
                        </div>
                        <div class="stat-box-vintage"><h4>🙈 كلمات عمياء</h4>
                            <p>أُنجز: ${sBlind.completed.length}/50</p>
                            <p>دقة: ${this.getAcc(sBlind.correct, sBlind.wrong)}%</p>
                            <p>صح: ${sBlind.correct}</p>
                        </div>
                        <div class="stat-box-vintage"><h4>⏳ سباق الزمن</h4>
                            <p>الأعلى: ${sTime.bestScore} كلمة</p>
                            <p>لُعبت: ${sTime.totalPlayed} مرة</p>
                        </div>
                    </div>`;

                if (weakWords.length > 0) {
                    html += `<div class="needs-practice-box">
                        <h4>⚠️ كلمات تحتاج لتدريب (تخطئ بها كثيراً)</h4>
                        <div class="needs-practice-words">${weakWords.map(w => `<span>${w}</span>`).join(' • ')}</div>
                    </div>`;
                }

                html += `<div class="quiz-controls" style="margin-top:15px; width:100%; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                    <button class="action-btn btn-hint" onmousedown="stopAllInteraction(event)" onclick="BankQuizManager.showCompletedWordsModal()">🏆 الكلمات المنجزة</button>
                    <button class="action-btn btn-quit" onmousedown="stopAllInteraction(event)" onclick="BankQuizManager.renderMenu()">↰ القائمة</button>
                    <button class="action-btn btn-giveup" onmousedown="stopAllInteraction(event)" onclick="BankQuizManager.resetAllStats()">🗑️ تصفير السجل</button>
                </div></div>`;
                
                html += `<div id="completed-words-modal" class="completed-words-modal">
                    <div class="completed-words-content">
                        <div class="popup-close-btn" style="top:-10px; right:-10px;" onmousedown="stopAllInteraction(event)" onclick="document.getElementById('completed-words-modal').style.display='none'">✕</div>
                        <h2 style="font-family:'Amiri'; color:var(--blue); margin-top:0;">سجل الكلمات المتقنة 🌟</h2>
                        <p style="font-size:0.9rem; color:#666;">الكلمات التي تمت الإجابة عليها من المحاولة الأولى بدون أي خطأ.</p>
                        
                        <h4 style="color:var(--ink); text-align:right; border-bottom:1px solid #ccc; margin-bottom:5px;">🔠 نص ⬅ شيفرة (${sT2M.completed.length}/50)</h4>
                        <div class="completed-list">${sT2M.completed.length > 0 ? sT2M.completed.map(w => `<span class="completed-badge">${w}</span>`).join('') : '<span style="color:#999; font-size:0.8rem;">لا يوجد بعد</span>'}</div>
                        
                        <h4 style="color:var(--ink); text-align:right; border-bottom:1px solid #ccc; margin-bottom:5px; margin-top:15px;">🎧 شيفرة ⬅ نص (${sM2T.completed.length}/50)</h4>
                        <div class="completed-list">${sM2T.completed.length > 0 ? sM2T.completed.map(w => `<span class="completed-badge">${w}</span>`).join('') : '<span style="color:#999; font-size:0.8rem;">لا يوجد بعد</span>'}</div>
                        
                        <h4 style="color:var(--ink); text-align:right; border-bottom:1px solid #ccc; margin-bottom:5px; margin-top:15px;">🙈 الكلمات العمياء (${sBlind.completed.length}/50)</h4>
                        <div class="completed-list">${sBlind.completed.length > 0 ? sBlind.completed.map(w => `<span class="completed-badge">${w}</span>`).join('') : '<span style="color:#999; font-size:0.8rem;">لا يوجد بعد</span>'}</div>
                    </div>
                </div>`;

                statsContainer.innerHTML = html;
            },
            
            showCompletedWordsModal: function() {
                const modal = document.getElementById('completed-words-modal');
                if (modal) modal.style.display = 'flex';
            },

            startGame: function(selectedMode) {
                if(!this.textDisplay) this.init();
                this.loadStats(); 
                this.mode = selectedMode;
                this.isActive = true;
                this.score = 0;
                
                document.getElementById('bank-menu-view').style.display = 'none';
                document.getElementById('bank-stats-view').style.display = 'none';
                document.getElementById('bank-game-view').style.display = 'flex';
                
                if (this.mode === 'textToMorse') this.modeTitle.innerText = "نص ⬅ شيفرة";
                else if (this.mode === 'morseToText') this.modeTitle.innerText = "شيفرة ⬅ نص";
                else if (this.mode === 'blind') this.modeTitle.innerText = "الكلمات العمياء 🙈";
                else if (this.mode === 'timeAttack') {
                    this.modeTitle.innerText = "سباق مع الزمن ⏳";
                    this.stats.timeAttack.totalPlayed++;
                    this.startTimer(60);
                }
                
                this.pickRandom(); this.updateUI();
            },
            startTimer: function(seconds) {
                this.timeLeft = seconds;
                this.modeTitle.innerText = `الوقت: ${this.timeLeft}ث ⏳`;
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    this.modeTitle.innerText = `الوقت: ${this.timeLeft}ث ⏳`;
                    if (this.timeLeft <= 0 || !this.isActive) {
                        this.stopTimer();
                        if(this.isActive) this.endTimeAttack();
                    }
                }, 1000);
            },
            stopTimer: function() {
                if(this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = null;
            },
            endTimeAttack: function() {
                this.isActive = false;
                this.feedback.className = 'quiz-feedback success';
                this.feedback.innerText = `انتهى الوقت! أحرزت ${this.score} كلمة 🏆`;
                if(window.playTone) {
                    playTone(523, 0.1, audioCtx.currentTime);
                    playTone(659, 0.1, audioCtx.currentTime + 0.1);
                    playTone(1046, 0.4, audioCtx.currentTime + 0.2);
                }
                this.saveStats();
                setTimeout(() => { this.renderMenu(); }, 3000);
            },
            pickRandom: function() {
                this.currentWordErrors = 0; 
                let pool = this.banks.timeAttack; 
                
                if (this.mode !== 'timeAttack') {
                    let modeStats = this.stats[this.mode];
                    if (!modeStats.remaining || modeStats.remaining.length === 0) {
                        modeStats.remaining = [...this.banks[this.mode]]; 
                        alert("🎉 مذهل! لقد أتقنت جميع الكلمات الـ 50 بنجاح من المحاولة الأولى في هذا الطور. تمت إعادة ملء البنك لتستمر في التدريب!");
                    }
                    pool = modeStats.remaining;
                }

                this.currentText = pool[Math.floor(Math.random() * pool.length)];
                this.currentMorse = this.currentText.split('').map(c => c===' ' ? '/' : this.dict[c]).join(' ');
                this.userInput = '';
                if(this.textInput) this.textInput.value = '';
                if(this.feedback) { this.feedback.innerText = ''; this.feedback.className = 'quiz-feedback'; }
                this.setMorseDisplay('');
                this.wordStartTime = Date.now(); 
                
                if (this.mode === 'blind') { setTimeout(() => { this.playCurrent(); }, 500); }
            },
            skipWord: function() {
                if (this.mode !== 'timeAttack') {
                    let modeStats = this.stats[this.mode];
                    modeStats.wrong++;
                    modeStats.streak = 0;
                    modeStats.needsPractice[this.currentText] = (modeStats.needsPractice[this.currentText] || 0) + 1;
                }
                this.pickRandom(); this.updateUI();
            },

            // ✨ الدالة الجديدة كلياً المسؤولة عن بناء المؤشر المضيء والتفاعلي
            updateTargetDisplay: function() {
                if (!this.textDisplay) return;
                
                if (this.mode === 'textToMorse' || this.mode === 'timeAttack') {
                    let html = '';
                    // عدد المسافات الصحيحة المدخلة هو بالضبط رقم الحرف الحالي الذي يعمل عليه المستخدم!
                    let currentIndex = (this.userInput.match(/ /g) || []).length;
                    
                    for (let i = 0; i < this.currentText.length; i++) {
                        let char = this.currentText[i];
                        if (i < currentIndex) {
                            // حروف مكتملة (خضراء باهتة)
                            html += `<span style="color: #27ae60; opacity: 0.4;">${char}</span>`;
                        } else if (i === currentIndex) {
                            // الحرف الحالي المستهدف (مكبر، برتقالي، تحته خط)
                            html += `<span style="color: #d35400; border-bottom: 4px solid #d35400; font-weight: bold; display: inline-block; padding-bottom: 2px; transform: scale(1.1); transition: all 0.2s;">${char === ' ' ? '&nbsp;' : char}</span>`;
                        } else {
                            // حروف قادمة لم يصل لها بعد
                            html += `<span style="color: var(--ink); opacity: 0.9;">${char}</span>`;
                        }
                    }
                    this.textDisplay.innerHTML = html;
                    
                } else if (this.mode === 'morseToText') {
                    let html = '';
                    let morseParts = this.currentMorse.split(' ');

                    // عدد الحروف التي طبعها المستخدم هو موقع الرمز الذي يجب ترجمته الآن!
                    let typedLen = this.textInput ? this.textInput.value.trim().length : 0;
                    
                    for (let i = 0; i < morseParts.length; i++) {
                        let part = morseParts[i];

                        if (i < typedLen) {
                            // رموز تمت ترجمتها
                            html += `<span style="color: #27ae60; opacity: 0.3;">${part}</span>`;

                        } else if (i === typedLen) {
                            // الرمز الحالي المطلوب ترجمته
                            html += `<span style="color: #d35400; border-bottom: 4px solid #d35400; font-weight: bold; padding-bottom: 2px; display: inline-block; transform: scale(1.1); transition: all 0.2s;">${part}</span>`;

                        } else {
                            // رموز متبقية
                            html += `<span style="color: var(--ink); opacity: 0.9;">${part}</span>`;
                        }

                        // إضافة مسافة جمالية بين رموز مورس
                        if (i < morseParts.length - 1) html += '&nbsp;&nbsp;'; 
                    }
                    this.textDisplay.innerHTML = html;
                    
                } else if (this.mode === 'blind') {
                    // في وضع الأعمى لا توجد رموز تضيء
                    this.textDisplay.innerText = "🔊 استمع واكتب النص";
                }
            },

            updateUI: function() {
                let noteContainer = document.getElementById('bank-word-note');
                if (!noteContainer) {
                    noteContainer = document.createElement('div');
                    noteContainer.id = 'bank-word-note';
                    noteContainer.style.cssText = "font-family: 'Amiri'; color: #c0392b; font-size: 0.85rem; line-height: 1.2; margin: 2px auto 8px auto; text-align: center; max-width: 95%; background: #fdf2e9; border: 1px dashed #e67e22; padding: 4px 10px; border-radius: 6px; box-shadow: inset 0 0 3px rgba(230, 126, 34, 0.1);";
                    this.modeTitle.parentNode.insertBefore(noteContainer, this.modeTitle.nextSibling);
                }

                if (this.mode === 'textToMorse' || this.mode === 'morseToText') {
                    let noteText = this.wordNotes[this.currentText] || "مصطلح ميداني للتدريب.";
                    noteContainer.innerHTML = `<span style="font-weight:bold; color:var(--blue);">💡 الهدف:</span> ${noteText}`;
                    noteContainer.style.display = 'block';
                } else {
                    noteContainer.style.display = 'none'; 
                }

                if (this.mode === 'textToMorse' || this.mode === 'timeAttack') {
                    this.textDisplay.style.fontFamily = "'Courier New', monospace";
                    this.textDisplay.style.letterSpacing = "5px";
                    this.textDisplay.style.fontSize = "clamp(2rem, 5vh, 3rem)";
                    this.setMorseDisplay(this.userInput);
                    this.morseControls.style.display = 'flex';
                    this.textControls.style.display = 'none';
                    this.updateTargetDisplay(); // تشغيل النظام المضيء بدلاً من النص العادي
                } else if (this.mode === 'morseToText' || this.mode === 'blind') {
                    this.textDisplay.style.fontFamily = "sans-serif";
                    this.textDisplay.style.letterSpacing = "2px";
                    this.textDisplay.style.fontSize = "clamp(1.5rem, 3.5vh, 2rem)";
                    this.morseControls.style.display = 'none';
                    this.textControls.style.display = 'flex';
                    if(this.textInput) { this.textInput.focus(); this.textInput.value = ''; }
                    this.updateTargetDisplay(); // تشغيل النظام المضيء هنا أيضاً
                }
                this.updateStatsUI();
            },
            
            updateStatsUI: function() {
                if (this.mode === 'timeAttack') return;
                let currentStats = this.stats[this.mode];
                const cEl = document.getElementById('bank-stat-correct');
                const wEl = document.getElementById('bank-stat-wrong');
                const accEl = document.getElementById('bank-stat-accuracy');
                const strEl = document.getElementById('bank-stat-streak');
                const strBadge = document.getElementById('bank-streak-badge');
                
                if(cEl) cEl.innerText = currentStats.completed.length + "/50";
                if(wEl) wEl.innerText = currentStats.wrong;
                if(accEl) accEl.innerText = this.getAcc(currentStats.correct, currentStats.wrong);
                if(strEl) {
                    strEl.innerText = currentStats.streak;
                    if (currentStats.streak >= 3) { strBadge.classList.add('streak-on-fire'); } 
                    else { strBadge.classList.remove('streak-on-fire'); }
                }
            },
            handleError: function() {
                this.currentWordErrors++; 
                if (audioCtx && window.playTone) {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    playTone(150, 0.3, audioCtx.currentTime); 
                }
                if (this.mode !== 'timeAttack') {
                    let currentStats = this.stats[this.mode];
                    currentStats.wrong++;
                    currentStats.streak = 0; 
                    this.saveStats(); this.updateStatsUI();
                }
            },
            showHint: function() {
                this.currentWordErrors++; 
                this.feedback.className = 'quiz-feedback'; this.feedback.style.color = 'var(--blue)';
                if (this.mode === 'textToMorse' || this.mode === 'timeAttack') {
                    let expectedArray = this.currentMorse.split(' ');
                    let inputArray = this.userInput.trim().split(' ');
                    let currentIndex = this.userInput === '' ? 0 : (this.userInput.endsWith(' ') ? inputArray.length : inputArray.length - 1);
                    if (currentIndex < expectedArray.length) this.feedback.innerText = `💡 تلميح: الحرف المطلوب هو ( ${expectedArray[currentIndex]} )`;
                } else {
                    let currentTyped = this.textInput.value.trim().toUpperCase();
                    if (currentTyped.length < this.currentText.length) this.feedback.innerText = `💡 تلميح: الحرف التالي هو [ ${this.currentText.charAt(currentTyped.length)} ]`;
                    this.textInput.focus();
                }
            },
            setMorseDisplay: function(text) {
                if (!text || text === '') { this.morseDisplay.innerText = '...'; this.morseDisplay.style.opacity = '0.5'; } 
                else { this.morseDisplay.innerText = text; this.morseDisplay.style.opacity = '1'; }
                this.updateTargetDisplay(); // تحديث إضاءة الحروف في كل مرة يتغير فيها الإدخال!
            },
            addMorse: function(c, playSound = true) {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                let duration = (c === '.') ? dotDuration : (dotDuration * 3);
                if(window.playTone && playSound) playTone(700, duration, audioCtx.currentTime);
                let btnEl = document.getElementById((c === '.') ? 'bank-btn-dot' : 'bank-btn-dash');
                if (btnEl) { let innerShape = btnEl.querySelector('div'); if (innerShape) { innerShape.classList.add('active'); setTimeout(() => innerShape.classList.remove('active'), duration * 1000); } }
                if(this.userInput==='') this.userInput = c; else this.userInput += c;
                this.setMorseDisplay(this.userInput); this.checkMorseInput();
            },
            addSpace: function() {
                if(this.userInput !== '' && !this.userInput.endsWith(' ')) {
                    let tempInput = this.userInput + ' ';
                    if (!this.currentMorse.startsWith(tempInput)) {
                        this.handleError();
                        this.feedback.className = 'quiz-feedback error'; this.feedback.style.color = ''; this.feedback.innerText = 'إدخال مسافة خاطئ! تم مسح الحرف تلقائياً.';
                        this.clearCurrentLetter(); 
                    } else { this.userInput += ' '; this.setMorseDisplay(this.userInput); this.checkMorseInput(); }
                }
            },

            clearInput: function() { 
                if(this.userInput.length > 0) { this.userInput = this.userInput.slice(0, -1); this.setMorseDisplay(this.userInput); }
                if(this.feedback) { this.feedback.innerText = ''; this.feedback.className = 'quiz-feedback'; }
            },
            clearCurrentLetter: function() { 
                if (this.userInput.includes(' ')) { let lastSpaceIndex = this.userInput.lastIndexOf(' '); this.userInput = this.userInput.substring(0, lastSpaceIndex + 1); } 
                else { this.userInput = ''; }
                this.setMorseDisplay(this.userInput);
                if(this.feedback) { this.feedback.innerText = ''; this.feedback.className = 'quiz-feedback'; }
            },

            checkMorseInput: function() {
                if (this.userInput === this.currentMorse) { this.success(); } 
                else if (!this.currentMorse.startsWith(this.userInput)) {
                    this.handleError();
                    this.feedback.className = 'quiz-feedback error'; this.feedback.style.color = ''; this.feedback.innerText = 'خطأ في هذا الحرف! تم مسحه تلقائياً';
                    setTimeout(() => { this.clearCurrentLetter(); }, 800);
                }
            },

            checkTextInput: function() {
                let val = this.textInput.value.trim().toUpperCase();
                if (val === this.currentText) { this.success(); } 
                else {
                    this.handleError();
                    this.feedback.className = 'quiz-feedback error'; this.feedback.style.color = ''; this.feedback.innerText = 'خطأ! الكلمة غير صحيحة، حاول مجدداً';
                    setTimeout(() => { this.feedback.innerText = ''; }, 1500);
                }
            },

            success: function() {
                let timeTaken = Date.now() - this.wordStartTime;
                
                if (this.mode === 'timeAttack') {
                    this.score++;
                    if (this.score > this.stats.timeAttack.bestScore) this.stats.timeAttack.bestScore = this.score;
                } else {
                    let modeStats = this.stats[this.mode];
                    modeStats.correct++;
                    modeStats.streak++;
                    modeStats.totalTimeMs += timeTaken;
                    if (modeStats.streak > modeStats.bestStreak) modeStats.bestStreak = modeStats.streak;
                    
                    if (this.currentWordErrors === 0) {
                        let idx = modeStats.remaining.indexOf(this.currentText);
                        if (idx > -1) modeStats.remaining.splice(idx, 1);
                        if (!modeStats.completed.includes(this.currentText)) {
                            modeStats.completed.push(this.currentText);
                        }

                    } else {
                        modeStats.needsPractice[this.currentText] = (modeStats.needsPractice[this.currentText] || 0) + 1;
                    }
                }
                
                this.saveStats();
                
                this.feedback.className = 'quiz-feedback success'; this.feedback.style.color = '';
                this.feedback.innerText = `ممتاز! 🌟`;
                if(window.playTone) { window.playTone(880, 0.1, audioCtx ? audioCtx.currentTime : 0); setTimeout(()=>window.playTone(1760, 0.2, audioCtx ? audioCtx.currentTime : 0), 150); }
                setTimeout(() => { this.pickRandom(); this.updateUI(); }, 1200);
            },
            playCurrent: function() { if(window.playMorseSequence) window.playMorseSequence(this.currentMorse.replace(/\//g, ' ')); }
        };

// --- نظام الجريدة العتيقة والمربع العريض (بدون تمرير) ---

        window.openNewspaperModal = function(e) {
            if(e) e.stopPropagation();
            if (isPlaying || window.isFlashlightActive || window.isRadioActive) { 
                window.stopAllAudioAndAnimations(); 
            }
            
            let modal = document.getElementById('newspaper-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'newspaper-modal';
                modal.className = 'newspaper-overlay';
                modal.onmousedown = function(ev) { if (ev.target === modal) window.closeNewspaperModal(); };
                modal.ontouchstart = function(ev) { if (ev.target === modal) window.closeNewspaperModal(); };
                
                modal.innerHTML = `
                    <div class="newspaper-container" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)">
                        <button class="newspaper-close-btn" onclick="closeNewspaperModal()" title="إغلاق">✕</button>
                        
                        <div class="newspaper-header">
                            <div class="newspaper-date">Vol. XCIII... No. 31,482<br>Tuesday, May 17, 1966</div>
                            <h1 class="newspaper-masthead">جريدة الواقعة القديمة</h1>
                            <div class="newspaper-tagline">توثيق تاريخي سري لأول رسالة مورس بصرية تخترق خطوط العدو خلف الكاميرات</div>
                        </div>

                        <div class="newspaper-body">
                            <div class="newspaper-main-col">
                                <h2 class="news-headline">سجين حرب يهزم سَجّانه برمشة عين: كشف أسرار عملية "جيرمياه دينتون"</h2>
                                <div class="news-article">
                                    <p>في واحدة من أذكى عمليات التخفي في التاريخ العسكري المعاصر، قام الطيار الأمريكي (جيرمياه دينتون) الذي وقع في الأسر، باستغلال مقابلة تلفزيونية دعائية أُجبر على إجرائها ليُرسل رسالة استغاثة سرية ومباشرة.</p>
                                    <p>أمام كاميرات التصوير، تظاهر القائد دينتون بأن الإضاءة القوية تزعج عينيه بشدة، وبدأ يرمش ببطء وبطريقة مدروسة للغاية. لم يلاحظ آسروه شيئاً غريباً في حركته، لكن ضباط الاستخبارات الذين حللوا المقطع لاحقاً التقطوا الرسالة بوضوح تام.</p>
                                    <p>لقد استخدم جفونه ليرمش بكلمة <span class="morse-highlight">T-O-R-T-U-R-E</span> (تعذيب) بشيفرة مورس، ليكون هذا أول تأكيد رسمي يصل للعالم بأن الأسرى يتعرضون لتعذيب وحشي وممنهج.</p>
                                </div>
                            </div>

                            <div class="newspaper-side-col">
                                <div class="film-strip-container">
                                    <div class="video-wrapper">
                                        <iframe id="news-video" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                                    </div>
                                </div>
                                <div class="film-caption">التسجيل المرئي الأصلي للواقعة - مُعالج من الأرشيف السري</div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            
            // تحميل الفيديو من Google Drive
            document.getElementById('news-video').src = "https://drive.google.com/file/d/1NbFXFm-TJG4JlU909K4M2IOWFnBD3cwO/preview";
            
            modal.style.display = 'flex';
        };

        window.closeNewspaperModal = function() {
            const modal = document.getElementById('newspaper-modal');
            if (modal) {
                modal.style.display = 'none';
                document.getElementById('news-video').src = ""; // إيقاف الفيديو عند الإغلاق
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            updateSpeed(7);
            const bookEl = document.querySelector('.book-stage');
            const sceneContainer = document.querySelector('.scene-container');
            const shadowEl = document.getElementById('book-shadow');
            const isMobile = window.innerWidth < 768;
            let sWidth = isMobile ? Math.min(window.innerWidth - 40, 420) : Math.min((window.innerWidth - 40) / 2, 400);
            let pHeight = Math.min(window.innerHeight - 40, 650);

// --- أوامر بناء الكتاب (التي كانت مفقودة وتسببت في توقف الكود) ---
            sceneContainer.style.width = (isMobile ? sWidth : sWidth * 2) + 'px';
            sceneContainer.style.height = pHeight + 'px';
            bookEl.innerHTML = buildBook();

           // --- نقل نافذة المفضلة إلى body مباشرة لضمان ظهورها فوق الكتاب دائماً وبشكل فوري ---
            if (!document.getElementById('bookmarks-review-modal')) {
                let bookmarksModal = document.createElement('div');
                bookmarksModal.id = 'bookmarks-review-modal';
                bookmarksModal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 9999999; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); direction: rtl;';
                bookmarksModal.onmousedown = stopAllInteraction;
                bookmarksModal.ontouchstart = stopAllInteraction;
                bookmarksModal.onmousemove = stopAllInteraction;
                bookmarksModal.onpointerdown = stopAllInteraction;
                bookmarksModal.onwheel = stopAllInteraction;
                bookmarksModal.onclick = stopAllInteraction;
                
                bookmarksModal.innerHTML = `
                    <div class="quiz-popup-content" style="width: 85vw !important; max-width: 85vw !important; height: 90vh !important; max-height: 90vh !important; border-radius: 15px; padding: 30px 20px 20px 20px; border: 4px solid var(--red); overflow: visible; text-align: center; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column;">
                        <div class="popup-close-btn" style="top:-10px; right:-10px;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="BookmarkManager.closeReview(event)">✕</div>
                        <h2 style="font-family:'Amiri'; color:var(--red); margin: 0 0 2px 0; font-size: 1.6rem;">⭐ الحروف والأرقام المفضلة</h2>
                        <p style="font-size:0.9rem; color:#666; font-family:'Amiri'; margin: 0 0 5px 0;">انقر على أي حرف للانتقال إليه مباشرة ومراجعته.</p>
                        <div id="bookmarks-list-content"></div>
                    </div>
                `;
                document.body.appendChild(bookmarksModal);
            }

            // --- نظام الحماية الذكي: قصر التقليب على حواف وزوايا الصفحة فقط ---
            document.querySelectorAll('.page').forEach(page => {
                ['mousedown', 'touchstart', 'pointerdown'].forEach(evt => {
                    page.addEventListener(evt, function(e) {
                        let clientX, clientY;
                        if (e.touches && e.touches.length > 0) {
                            clientX = e.touches[0].clientX;
                            clientY = e.touches[0].clientY;
                        } else {
                            clientX = e.clientX;
                            clientY = e.clientY;
                        }

                        const rect = this.getBoundingClientRect();
                        const x = clientX - rect.left;
                        const y = clientY - rect.top;
                        const width = rect.width;
                        const height = rect.height;

                        // تحديد منطقة الحواف المسموح التقليب منها (15% من الأطراف يميناً ويساراً وأعلى وأسفل)
                        const isEdgeX = (x < width * 0.15) || (x > width * 0.85);
                        const isEdgeY = (y < height * 0.15) || (y > height * 0.85);

// إذا كان النقر في منتصف الصفحة (ليس على الحواف)، يتم إيقاف الحدث لمنع التقليب العشوائي
                        if (!isEdgeX && !isEdgeY) {
                            e.stopPropagation();
                        }
                    }, { passive: false });
                });
            });


const PageFlip = St.PageFlip;

         // --- التعديل الجذري للهاتف: تحويل الكتاب إلى صفحات قابلة للتمرير الجانبي (من اليسار لليمين بدقة) ---
            if (isMobile) {
                let mobileHeight = window.innerHeight - 60; // طرح 60 بكسل لترك 30 بكسل بالضبط من الأعلى و 30 بكسل من الأسفل

                // التعديل: استخدام window.innerHeight بدلاً من 100vh لمنع شريط المتصفح من رفع الكتاب للأعلى
                // مع إضافة خصائص التوسيط الإجباري (Flexbox) للحاوية الأساسية
                sceneContainer.style.width = '100vw';
                sceneContainer.style.height = window.innerHeight + 'px';
                sceneContainer.style.overflow = 'hidden';
                sceneContainer.style.display = 'flex';
                sceneContainer.style.alignItems = 'center';
                sceneContainer.style.justifyContent = 'center';
                
                // تعديل هيكل الكتاب ليكون حاوية تمرير أفقية مع ارتفاع محدد لترك المسافات المتساوية
                bookEl.style.display = 'flex';
                bookEl.style.flexDirection = 'row';
                bookEl.style.direction = 'ltr'; // إجبار الترتيب من اليسار لليمين كما طلبت تماماً
                bookEl.style.overflowX = 'auto';
                bookEl.style.overflowY = 'hidden';
                bookEl.style.scrollSnapType = 'x mandatory';
                bookEl.style.scrollBehavior = 'smooth';
                bookEl.style.width = '100vw';
                bookEl.style.height = mobileHeight + 'px';
                bookEl.style.margin = 'auto'; // إجبار الكتاب على البقاء في المركز تماماً
                bookEl.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)'; // إضافة ظل خفيف لبروز الكتاب عن الخلفية المخططة
                
                // تعديل الصفحات لتتناسب مع التمرير وتعود لاتجاهها العربي الصحيح داخلياً
                document.querySelectorAll('.page').forEach(page => {
                    page.style.position = 'relative';
                    page.style.flex = '0 0 100vw';
                    page.style.width = '100vw';
                    page.style.height = '100%';
                    page.style.scrollSnapAlign = 'center';
                    page.style.overflowY = 'auto'; // السماح بالتمرير العمودي داخل الصفحة
                    page.style.overflowX = 'hidden';
                    page.style.direction = 'rtl'; // إعادة المحتوى للغة العربية من اليمين لليسار
                });

                // إخفاء ظل الكتاب الوهمي لأنه لم يعد مفيداً في الهاتف
                if(shadowEl) shadowEl.style.display = 'none';

                // إنشاء نسخة وهمية من bookFlipInstance لكي لا تتعطل دوال الفهرس والمفضلة
                bookFlipInstance = {
                    flipNext: () => bookEl.scrollBy({ left: window.innerWidth, behavior: 'smooth' }), // التمرير لليمين (الصفحة التالية)
                    flipPrev: () => bookEl.scrollBy({ left: -window.innerWidth, behavior: 'smooth' }), // التمرير لليسار (الصفحة السابقة)
                    flip: (index) => {
                        const pages = document.querySelectorAll('.page');
                        if(pages[index]) {
                            // التمرير المباشر في الأجهزة المحمولة لتجنب الأخطاء في حساب المسافات
                            bookEl.scrollTo({ left: index * window.innerWidth, behavior: 'auto' });
                            updateBookState(index);
                        }
                    },
                    getCurrentPageIndex: () => Math.round(bookEl.scrollLeft / window.innerWidth),
                    getPageCount: () => document.querySelectorAll('.page').length
                };

               // تحديث حالة الكتاب (رقم الصفحة وما إلى ذلك) عند التمرير
                let scrollTimeout;
                bookEl.addEventListener('scroll', () => {
                    // --- التعديل الجذري للهاتف: الإيقاف الفوري للصوت والإضاءة بمجرد بدء التمرير (بصفر تأخير) ---
                    try {
                        if (typeof stopMorse === 'function') stopMorse();
                        if (typeof stopPlayback === 'function') stopPlayback();
                        if (window.audioCtx && window.audioCtx.state === 'running') window.audioCtx.suspend();
                        if (window.audioContext && window.audioContext.state === 'running') window.audioContext.suspend();
                        if (window.stopAllAudioAndAnimations) window.stopAllAudioAndAnimations();
                        window.currentWordPlaybackId = Date.now(); // قتل إضاءة مفكك الكلمات فوراً
                        document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
                    } catch(err) {
                        console.log("خطأ في إيقاف الصوت أثناء التمرير:", err);
                    }
                    // --------------------------------------------------------------------------------------------------

                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(() => {
                        if (typeof updateBookState === 'function') {
                            updateBookState(bookFlipInstance.getCurrentPageIndex());
                        }
                    }, 150);
                });

            } else {
                // إبقاء تقليب الصفحات الكلاسيكي لأجهزة الكمبيوتر
                bookFlipInstance = new PageFlip(bookEl, { width: sWidth, height: pHeight, size: 'fixed', direction: 'rtl', usePortrait: false, showCover: true, flippingTime: 600, clickEventForward: true });
                bookFlipInstance.loadFromHTML(document.querySelectorAll('.page'));
            }

const updateBookState = (p) => {
                const total = bookFlipInstance.getPageCount();
                const pages = document.querySelectorAll('.page');
                
                // --- الإيقاف الفوري لجميع الأصوات والأنيميشن والتفاعلات عند بداية قلب أي صفحة ---
                if (window.stopAllAudioAndAnimations) window.stopAllAudioAndAnimations();

                // إيقاف التمارين مؤقتاً إذا غادرنا صفحاتها
                if (pages[p] && pages[p].id !== 'quiz-page' && QuizManager.isActive) QuizManager.pauseGame();
                if (pages[p] && pages[p].id !== 'quiz-numbers-page' && NumbersQuizManager.isActive) NumbersQuizManager.pauseGame();

             // الإيقاف الصحيح لبنك التحديات: إرجاع المستخدم للقائمة الرئيسية بدلاً من دالة غير موجودة
                if (pages[p] && pages[p].id !== 'quiz-bank-page' && BankQuizManager.isActive) {
                    BankQuizManager.renderMenu();
                }
                
// إظهار القائمة الرئيسية للبنك عند الوصول لصفحته بدلاً من بدء اللعب العشوائي
                if (pages[p] && pages[p].id === 'quiz-bank-page' && !BankQuizManager.isActive) {
                    BankQuizManager.renderMenu();
                }
                
               // إعادة تعيين مفكك الكلمات إذا غادرنا صفحته
                if (pages[p] && pages[p].id !== 'content-words') {
                    if (window.resetWordDecoder) window.resetWordDecoder();
                }

                // --- التعديل: إيقاف أي صوت يعمل حالياً عند انتقال الصفحة بشكل فوري (للهاتف والكمبيوتر وقسم الكلمات) ---
                try {
                    // 1. إيقاف دوال الصوت الخاصة بمورس (إن كانت تعمل)
                    if (typeof stopMorse === 'function') stopMorse();
                    if (typeof stopPlayback === 'function') stopPlayback();
                    
                    // 2. إيقاف ترددات الـ Web Audio API بصرامة تامة
                    if (window.audioCtx && window.audioCtx.state === 'running') {
                        window.audioCtx.suspend();
                    }
                    if (window.audioContext && window.audioContext.state === 'running') {
                        window.audioContext.suspend();
                    }
                    
                    // 3. إيقاف أي عناصر صوتية <audio> مدمجة في الصفحة
                    document.querySelectorAll('audio').forEach(a => { 
                        a.pause(); 
                        a.currentTime = 0; 
                    });
                } catch(err) {
                    console.log("تم احتواء خطأ إيقاف الصوت:", err);
                }
                // ---------------------------------------------------------------------------------------------

                setTimeout(() => { isFlipping = false; }, 600);
                const shift = sceneContainer.offsetWidth / 4;
                if (!isMobile) {
                    if (p === 0) { shadowEl.style.width = '50%'; shadowEl.style.left = '50%'; bookEl.style.transform = shadowEl.style.transform = `translate3d(${-shift}px, 0, 0)`; }
                    else if (p === total - 1) { shadowEl.style.width = '50%'; shadowEl.style.left = '0%'; bookEl.style.transform = shadowEl.style.transform = `translate3d(${shift}px, 0, 0)`; }
                    else { shadowEl.style.width = '100%'; shadowEl.style.left = '0%'; bookEl.style.transform = shadowEl.style.transform = 'translate3d(0, 0, 0)'; }
                }
            };

if (!isMobile) {
                bookFlipInstance.on('flip', (e) => updateBookState(e.data));
            }
            updateBookState(0);
            QuizManager.renderStartScreen();
            NumbersQuizManager.renderStartScreen();
        });

    </script>
