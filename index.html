        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let dotDuration = 0.1;
        let isPlaying = false; 
        let bookFlipInstance; 
        let isFlipping = false; // Flag to prevent double flips
        let activeOscillators = []; // مصفوفة لتتبع كل الأصوات المجدولة لإيقافها
        
        // Manual Tone Control for Spacebar
        let oscNode = null;
        let gainNode = null;

        function updateSpeed(val) {
            let speed = parseInt(val);
            dotDuration = 0.25 - ((speed - 1) * 0.022);
            if (dotDuration < 0.05) dotDuration = 0.05;
        }
        
        function startContinuousTone(freq) {
             if(oscNode) return; // Already playing
             oscNode = audioCtx.createOscillator();
             gainNode = audioCtx.createGain();
             oscNode.type = 'sine';
             oscNode.frequency.setValueAtTime(freq, audioCtx.currentTime);
             
             gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
             gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.005);
             
             oscNode.connect(gainNode);
             gainNode.connect(audioCtx.destination);
             oscNode.start();
        }
        
        function stopContinuousTone() {
            if(oscNode && gainNode) {
                const now = audioCtx.currentTime;
                gainNode.gain.cancelScheduledValues(now);
                gainNode.gain.setValueAtTime(gainNode.gain.value, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.005);
                oscNode.stop(now + 0.01);
                
                // Cleanup after stop
                setTimeout(() => {
                    if (oscNode) { oscNode.disconnect(); oscNode = null; }
                    if (gainNode) { gainNode.disconnect(); gainNode = null; }
                }, 20);
            }
        }

        function playTone(frequency, duration, startTime) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, startTime);
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.5, startTime + 0.005);
            gainNode.gain.linearRampToValueAtTime(0, startTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(startTime);
            oscillator.stop(startTime + duration + 0.05);

            // حفظ التردد في المصفوفة لتتمكن من إيقافه لاحقاً
            activeOscillators.push(oscillator);
            
            // تنظيف المصفوفة تلقائياً عند انتهاء الصوت بشكل طبيعي
            oscillator.onended = () => {
                const index = activeOscillators.indexOf(oscillator);
                if (index > -1) activeOscillators.splice(index, 1);
            };
        }

// --- دالة الإيقاف الشامل (Kill Switch) فائقة الأداء لحماية التطبيق ---
        window.stopAllAudioAndAnimations = function() {
            // 1. إيقاف حالة التشغيل لإلغاء أي أنيميشن قيد العمل فوراً
            isPlaying = false; 
            
            // 2. إيقاف الصوت المستمر (الخاص بزر المسافة)
            stopContinuousTone(); 
            
            // 3. تنظيف الذاكرة العشوائية (RAM) من الترددات الصوتية المجدولة
            if (activeOscillators && activeOscillators.length > 0) {
                activeOscillators.forEach(osc => {
                    try { 
                        osc.stop(); 
                        osc.disconnect(); 
                    } catch(e) {}
                });
                activeOscillators = []; // تصفير المصفوفة فوراً
            }

            // 4. إطفاء الواجهة المرئية بسلاسة باستخدام كرت الشاشة (GPU Sync)
            requestAnimationFrame(() => {
                const playingBtns = document.getElementsByClassName('playing');
                const activeLeds = document.getElementsByClassName('active');
                
                while (playingBtns.length > 0) playingBtns[0].classList.remove('playing');
                while (activeLeds.length > 0) activeLeds[0].classList.remove('active');
            });
        };

        // دالة تجربة الصوت من الغلاف (تم إصلاحها)
        function previewTone(type, btnElement) {
            if(window.event) window.event.stopPropagation();
            if (isPlaying) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let duration = (type === 'dot') ? dotDuration : (dotDuration * 3);
            let startTime = audioCtx.currentTime;
            playTone(700, duration, startTime); 
            const innerShape = btnElement.querySelector('div');
            if(innerShape) {
                innerShape.classList.add('active');
                setTimeout(() => { innerShape.classList.remove('active'); }, duration * 1000);
            }
        }

     function stopAllInteraction(e) { 
            if(e) {
                e.stopPropagation(); 
                if(e.stopImmediatePropagation) e.stopImmediatePropagation();
            }
        }

        // دالة محاكاة القواعد الزمنية (تضيء النقاط والشرطات بالإضافة لدوائر الصمت)
        window.playTimingExample = function(type, parentId) {
            if (isPlaying) return;
            isPlaying = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const parent = document.getElementById(parentId);
            const btn = parent.querySelector('.small-audio-btn');
            if(btn) btn.classList.add('playing');
            
            let T = dotDuration;
            let startTime = audioCtx.currentTime;
            let accumulatedTime = 0;
            let visualEvents = [];
            
            let seq = [];
            if (type === 'dit') seq = [{dur: T, id: 'led-dit', tone: true}];
            if (type === 'dah') seq = [{dur: T*3, id: 'led-dah', tone: true}];
            if (type === 'intra') seq = [
                {dur: T, id: 'led-intra-1', tone: true}, 
                {dur: T, id: 'ghost-intra-0', tone: false}, 
                {dur: T, id: 'led-intra-2', tone: true}
            ];

            if (type === 'inter') seq = [
                {dur: T, id: 'led-inter-1', tone: true},
                {dur: T, id: 'ghost-inter-0', tone: false}, {dur: T, id: 'ghost-inter-1', tone: false}, {dur: T, id: 'ghost-inter-2', tone: false},
                {dur: T, id: 'led-inter-2', tone: true}
            ];

            if (type === 'word') seq = [
                {dur: T*3, id: 'led-word-1', tone: true},
                {dur: T, id: 'ghost-word-0', tone: false}, {dur: T, id: 'ghost-word-1', tone: false}, {dur: T, id: 'ghost-word-2', tone: false},
                {dur: T, id: 'ghost-word-3', tone: false}, {dur: T, id: 'ghost-word-4', tone: false}, {dur: T, id: 'ghost-word-5', tone: false},
                {dur: T, id: 'ghost-word-6', tone: false},
                {dur: T*3, id: 'led-word-2', tone: true}
            ];

            seq.forEach(step => {
                if(step.tone) playTone(700, step.dur, startTime + accumulatedTime);
                visualEvents.push({t: accumulatedTime, type: 'on', el: step.id});
                visualEvents.push({t: accumulatedTime + step.dur, type: 'off', el: step.id});
                accumulatedTime += step.dur;
            });

            function sync() {
                if (!isPlaying) return;
                const now = audioCtx.currentTime - startTime;
                
                for (let i = 0; i < visualEvents.length; i++) {
                    const e = visualEvents[i];
                    if (!e.done && now >= e.t) {
                        const el = document.getElementById(e.el);
                        if (el) {
                            if (e.type === 'on') el.classList.add('active');
                            else el.classList.remove('active');
                        }
                        e.done = true;
                    }
                }

                if (now < accumulatedTime + 0.1) {
                    requestAnimationFrame(sync);
                } else {
                    isPlaying = false;
                    if(btn) btn.classList.remove('playing');
                }
            }
            sync();
        };

        function restartBook(e) {
            stopAllInteraction(e);
            if(bookFlipInstance) {
                if(bookFlipInstance.getCurrentPageIndex() === 0) return; 
                bookFlipInstance.flip(0);
            }
        }

        function jumpToSection(id) {
            if(window.event) window.event.stopPropagation();
            const pages = document.querySelectorAll('.page');
            let targetIndex = -1;
            for(let i=0; i<pages.length; i++) {
                if(pages[i].id === id) {
                    targetIndex = i;
                    break;
                }
            }

            if(targetIndex !== -1 && bookFlipInstance) {
                bookFlipInstance.flip(targetIndex);
            }
        }

        function playMorseSequence(sequence, pageId) {
            if(window.event) {
                window.event.stopPropagation();
                window.event.stopImmediatePropagation(); 
            }
            
            if (isPlaying) return; 
            isPlaying = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let currentDot = dotDuration;
            let currentDash = dotDuration * 3;
            let currentSpace = dotDuration;
            const pageEl = document.getElementById(pageId); 
            
            let btn;
            if (window.event && window.event.currentTarget) {
                btn = window.event.currentTarget;
                btn.classList.add('playing');
            } else if (pageEl) {
                btn = pageEl.querySelector('.audio-btn');
                if(btn) btn.classList.add('playing');
            }

            let codeUnits = [];
            if(pageEl && !pageId.startsWith('quiz')) {
                 codeUnits = pageEl.querySelectorAll('.code-bar > div, .card-code > div');
            }
            
            let startTime = audioCtx.currentTime; 
            let accumulatedTime = 0;
            let visualEvents = [];

            for (let i = 0; i < sequence.length; i++) {
                let symbol = sequence[i];
                let duration = (symbol === '.') ? currentDot : currentDash;
                
                playTone(700, duration, startTime + accumulatedTime);
                
                if(codeUnits[i]) {
                    visualEvents.push({
                        time: startTime + accumulatedTime,
                        type: 'on',
                        element: codeUnits[i]
                    });

                    visualEvents.push({
                        time: startTime + accumulatedTime + duration,
                        type: 'off',
                        element: codeUnits[i]
                    });
                }
                
                accumulatedTime += duration + currentSpace;
            }

            const totalDuration = accumulatedTime;

            function syncLoop() {
                if (!isPlaying) return;
                const now = audioCtx.currentTime;
                for (let i = 0; i < visualEvents.length; i++) {
                    const event = visualEvents[i];
                    if (!event.processed && now >= event.time) {
                        if (event.type === 'on') {
                            event.element.classList.add('active');
                        } else {
                            event.element.classList.remove('active');
                        }
                        event.processed = true;
                    }
                }

                if (now > startTime + totalDuration + 0.1) {
                    isPlaying = false;
                    if(btn) btn.classList.remove('playing');
                    codeUnits.forEach(u => u.classList.remove('active'));
                } else {
                    requestAnimationFrame(syncLoop);
                }
            }
            requestAnimationFrame(syncLoop);
        }

        // دالة جديدة لتشغيل تسلسل مركب (رقمين مع فاصل)
        function playJoinedSequence(seq1, seq2, pageId) {
            if(window.event) {
                window.event.stopPropagation();
                window.event.stopImmediatePropagation(); 
            }
            
            if (isPlaying) return; 
            isPlaying = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let currentDot = dotDuration;
            let currentDash = dotDuration * 3;
            let currentSpace = dotDuration; // space between parts of same letter
            let letterSpace = dotDuration * 3; // Space between letters (or numbers in this case)
            
            const pageEl = document.getElementById(pageId); 
            let btn;
            if (window.event && window.event.currentTarget) {
                btn = window.event.currentTarget;
                btn.classList.add('playing');
            }

            // تجميع العناصر المرئية من جزأين منفصلين في الصفحة
            let codeUnits1 = pageEl ? pageEl.querySelectorAll('.part1 > div') : [];
            let codeUnits2 = pageEl ? pageEl.querySelectorAll('.part2 > div') : [];
            
            let startTime = audioCtx.currentTime; 
            let accumulatedTime = 0;
            let visualEvents = [];

            // معالجة الرقم الأول
            for (let i = 0; i < seq1.length; i++) {
                let symbol = seq1[i];
                let duration = (symbol === '.') ? currentDot : currentDash;
                playTone(700, duration, startTime + accumulatedTime);
                if(codeUnits1[i]) {
                    visualEvents.push({ time: startTime + accumulatedTime, type: 'on', element: codeUnits1[i] });
                    visualEvents.push({ time: startTime + accumulatedTime + duration, type: 'off', element: codeUnits1[i] });
                }
                accumulatedTime += duration + currentSpace;
            }

            // إضافة وقت انتظار (فاصل بين الرقمين)
            accumulatedTime += letterSpace;

            // معالجة الرقم الثاني
            for (let i = 0; i < seq2.length; i++) {
                let symbol = seq2[i];
                let duration = (symbol === '.') ? currentDot : currentDash;
                playTone(700, duration, startTime + accumulatedTime);
                if(codeUnits2[i]) {
                    visualEvents.push({ time: startTime + accumulatedTime, type: 'on', element: codeUnits2[i] });
                    visualEvents.push({ time: startTime + accumulatedTime + duration, type: 'off', element: codeUnits2[i] });
                }
                accumulatedTime += duration + currentSpace;
            }

            const totalDuration = accumulatedTime;

            function syncLoopCompound() {
                if (!isPlaying) return;
                const now = audioCtx.currentTime;
                for (let i = 0; i < visualEvents.length; i++) {
                    const event = visualEvents[i];
                    if (!event.processed && now >= event.time) {
                        if (event.type === 'on') event.element.classList.add('active');
                        else event.element.classList.remove('active');
                        event.processed = true;
                    }
                }

                if (now > startTime + totalDuration + 0.1) {
                    isPlaying = false;
                    if(btn) btn.classList.remove('playing');
                    codeUnits1.forEach(u => u.classList.remove('active'));
                    codeUnits2.forEach(u => u.classList.remove('active'));
                } else {
                    requestAnimationFrame(syncLoopCompound);
                }
            }
            requestAnimationFrame(syncLoopCompound);
        }

        /* --- Quiz Logic Module --- */
        const QuizManager = {
            state: {
                correct: {}, 
                wrong: {},
                recentItems: [], 
                history: [], 
                currentQ: null,
                sessionCorrect: 0,
                sessionTotal: 0,
                sessionWrong: 0,
                sessionStartTime: 0,
                roundRemaining: [],
                roundStartTime: 0,
                roundDateStart: null, 
                roundSessions: 0,
                letterMistakes: {}, 
                roundDurationAccumulated: 0
            },
            currentQuestionFailed: false, 
            isActive: false, 
            isInputMode: false,
            hintStep: 0, 
            sessionMap: {}, 
            
            init: function() {
                const saved = localStorage.getItem('morseQuizState');
                if(saved) {
                    this.state = JSON.parse(saved);
                }
                if(!this.state.correct) this.state.correct = {};
                if(!this.state.wrong) this.state.wrong = {};
                if(!this.state.history) this.state.history = [];
                if(!this.state.recentItems) this.state.recentItems = [];
                if(!this.state.letterMistakes) this.state.letterMistakes = {};
                if(!this.state.roundRemaining || this.state.roundRemaining.length === 0) {
                     this.state.roundRemaining = stories.map(s => s.char);
                }
            },

            save: function() {
                localStorage.setItem('morseQuizState', JSON.stringify(this.state));
            },

            reset: function() {
                const remaining = this.state.roundRemaining ? this.state.roundRemaining.length : 26;
                const completed = 26 - remaining;
                const hasProgress = completed > 0 || (this.state.letterMistakes && Object.keys(this.state.letterMistakes).length > 0);

                if (hasProgress) {
                    let currentSessionTime = 0;
                    if (this.state.sessionStartTime > 0) {
                         currentSessionTime = Date.now() - this.state.sessionStartTime;
                    }
                    const totalDuration = (this.state.roundDurationAccumulated || 0) + currentSessionTime;
                    const endDate = new Date();
                    const endDateStr = `${endDate.getHours()}:${endDate.getMinutes() < 10 ? '0'+endDate.getMinutes() : endDate.getMinutes()}`;

                    this.state.history.push({
                        id: this.state.history.length + 1,
                        startDate: this.state.roundDateStart || this.formatDate(Date.now()),
                        endDate: endDateStr,
                        correct: completed,
                        wrong: Object.values(this.state.letterMistakes || {}).reduce((a, b) => a + b, 0),
                        duration: totalDuration,
                        entries: this.state.roundSessions,
                        status: "إعادة ضبط"
                    });
                }

                this.state.sessionCorrect = 0;
                this.state.sessionTotal = 0;
                this.state.sessionWrong = 0;
                this.state.correct = {};
                this.state.wrong = {};
                this.state.recentItems = [];
                this.state.roundRemaining = stories.map(s => s.char);
                this.state.letterMistakes = {};
                this.state.roundStartTime = 0;
                this.state.roundDateStart = null; 
                this.state.roundSessions = 0;
                this.state.roundDurationAccumulated = 0;
                this.sessionMap = {};
                this.save();
                this.renderStartScreen();
            },

            getNextQuestion: function() {
                if(!this.state.roundRemaining || this.state.roundRemaining.length === 0) {
                    this.state.roundRemaining = stories.map(s => s.char);
                }
                let candidates = stories.filter(s => this.state.roundRemaining.includes(s.char));
                const recentChars = this.state.recentItems || [];
                const availableCandidates = candidates.filter(s => !recentChars.includes(s.char));
                if (availableCandidates.length > 0) {
                    candidates = availableCandidates;
                }
                if (candidates.length === 0) candidates = stories;
                const target = candidates[Math.floor(Math.random() * candidates.length)];
                const type = Math.floor(Math.random() * 4);
                return { target, type };
            },

            renderStartScreen: function() {
                this.isActive = false;
                this.isInputMode = false;
                const container = document.getElementById('quiz-dynamic-content');
                if(!container) return;
                document.getElementById('quiz-card')?.classList.remove('compact-mode');
                const totalAnswered = stories.length - this.state.roundRemaining.length;
                const totalLetters = stories.length;
                const percent = Math.round((totalAnswered / totalLetters) * 100);
                const isRoundInProgress = this.state.roundRemaining.length < stories.length && this.state.roundRemaining.length > 0;
                const startBtnText = isRoundInProgress ? "تابع التمرين" : "ابداء التمارين";

                container.innerHTML = `
                    <div class="quiz-title">اختبر معلوماتك</div>
                    <div class="quiz-status">تقدم الجولة: ${percent}% (${totalAnswered}/${totalLetters})</div>
                    <div style="font-size: 4rem; margin: 10px;">🎓</div>
                    <div class="quiz-controls">
                        <button class="action-btn btn-start" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.startQuiz()">${startBtnText}</button>
                        <button class="action-btn btn-reset" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.reset()">إعادة الضبط (جولة جديدة)</button>
                        <button class="action-btn btn-stats" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.showStats()">عرض الإحصائيات</button>
                    </div>
                `;
            },

            showStats: function() {
                const container = document.getElementById('quiz-dynamic-content');
                let html = `<div class="quiz-title">الإحصائيات</div>`;
                html += `<h4 style="margin:5px 0; color:var(--blue);">أداء الحروف (الجولة الحالية)</h4>`;
                html += `<div style="height:150px; overflow-y:auto; width:100%; border:1px solid #ccc; border-radius:5px;"><table class="stats-table"><tr><th>الحرف</th><th>الحالة</th><th>الأخطاء</th></tr>`;
                stories.forEach(s => {
                    let mistakes = this.state.letterMistakes[s.char] || 0;
                    let isRemaining = this.state.roundRemaining.includes(s.char);
                    let status = '⚪'; 
                    if (!isRemaining) {
                        status = (mistakes > 0) ? '⚠️' : '✅';
                    } else {
                        status = (mistakes > 0) ? '❌' : '⚪';
                    }
                    html += `<tr><td>${s.char}</td><td>${status}</td><td>${mistakes}</td></tr>`;
                });
                html += `</table></div>`;
                html += `<h4 style="margin:10px 0 5px 0; color:var(--red);">سجل الجولات</h4>`;
                html += `<div style="height:120px; overflow-y:auto; width:100%; border:1px solid #ccc; border-radius:5px;">
                    <table class="stats-table history-table">
                        <tr><th>#</th><th>البدء</th><th>الانتهاء</th><th>المدة</th><th>صح</th><th>خطأ</th></tr>`;
                if (this.state.roundRemaining.length < 26 || (this.state.letterMistakes && Object.keys(this.state.letterMistakes).length > 0)) {
                    let currentAddedTime = 0;
                    if (this.isActive && this.state.sessionStartTime > 0) {
                        currentAddedTime = Date.now() - this.state.sessionStartTime;
                    }
                    const totalCurrentDuration = (this.state.roundDurationAccumulated || 0) + currentAddedTime;
                    const currentCompleted = 26 - this.state.roundRemaining.length;
                    const currentMistakes = Object.values(this.state.letterMistakes).reduce((a, b) => a + b, 0);
                    const startDisp = this.state.roundDateStart ? this.state.roundDateStart.split(' ')[1] : 'الآن';
                    html += `<tr class="current-round-row"><td>*</td><td>${startDisp}</td><td style="color:var(--active-glow);">جاري...</td><td>${this.formatTime(totalCurrentDuration)}</td><td>${currentCompleted}/26</td><td>${currentMistakes}</td></tr>`;
                }
                [...this.state.history].reverse().forEach(h => {
                    const startTimeStr = h.startDate ? h.startDate.split(' ')[1] : '-';
                    html += `<tr><td>${h.id}</td><td>${startTimeStr}</td><td>${h.endDate}</td><td>${this.formatTime(h.duration)}</td><td>${h.correct}</td><td>${h.wrong}</td></tr>`;
                });
                html += `</table></div>`;
                html += `<div class="quiz-controls"><button class="action-btn btn-quit" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.renderStartScreen()">عودة</button></div>`;
                container.innerHTML = html;
            },

            startQuiz: function() {
                this.isActive = true;
                if (!this.state.roundRemaining || this.state.roundRemaining.length === 0) {
                    this.state.roundRemaining = stories.map(s => s.char);
                    this.state.roundStartTime = Date.now();
                    const now = new Date();
                    this.state.roundDateStart = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes() < 10 ? '0'+now.getMinutes() : now.getMinutes()}`;
                    this.state.roundDurationAccumulated = 0;
                    this.state.roundSessions = 0;
                    this.state.letterMistakes = {};
                } else if (!this.state.roundDateStart) {
                    const now = new Date();
                    this.state.roundDateStart = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes() < 10 ? '0'+now.getMinutes() : now.getMinutes()}`;
                }
                this.state.sessionStartTime = Date.now();
                this.state.roundSessions = (this.state.roundSessions || 0) + 1;
                this.save();
                this.state.sessionCorrect = 0;
                this.state.sessionWrong = 0;
                this.state.sessionTotal = 0;
                this.sessionMap = {}; 
                this.nextQuestion();
            },

            nextQuestion: function() {
                this.resumeGame();
                this.currentQuestionFailed = false;
                this.hintStep = 0; 
                const q = this.getNextQuestion();
                this.state.currentQ = q;
                const container = document.getElementById('quiz-dynamic-content');
                this.isInputMode = (q.type === 3);
                let contentHtml = '';
                let isCompact = false;
                
                if (q.type === 0) { 
                    contentHtml += `<div class="quiz-question-text">اختر الشيفرة الصحيحة للحرف</div>`;
                    contentHtml += `<div class="quiz-big-char">${q.target.char}</div>`;
                    contentHtml += `<div class="quiz-options-grid">${this.generateOptions(q.target, 'code')}</div>`;
                } else if (q.type === 1) { 
                    contentHtml += `<div class="quiz-question-text">ما هو الحرف صاحب هذه الشيفرة؟</div>`;
                    contentHtml += `<div class="quiz-big-char" style="direction:ltr !important; font-size:4rem;">${q.target.seqStr}</div>`;
                    contentHtml += `<div class="quiz-options-grid">${this.generateOptions(q.target, 'char')}</div>`;
                } else if (q.type === 2) { 
                    contentHtml += `<div class="quiz-question-text">استمع واختر الحرف</div>`;
                    contentHtml += `<div class="audio-btn" style="position:relative; margin: 10px auto;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="playMorseSequence('${q.target.seqStr}', 'quiz-audio')"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></div>`;
                    contentHtml += `<div class="quiz-options-grid">${this.generateOptions(q.target, 'char')}</div>`;
                    setTimeout(() => playMorseSequence(q.target.seqStr, 'quiz-audio'), 500);
                } else if (q.type === 3) { 
                    isCompact = true; 
                    contentHtml += `<div class="quiz-question-text" style="margin-bottom:0;">اكتب شيفرة الحرف</div>`;
                    contentHtml += `<div class="quiz-big-char">${q.target.char}</div>`;
                    contentHtml += `<div class="quiz-input-area" id="input-display" style="direction:ltr !important;"></div>`;
                    contentHtml += `<div class="quiz-controls quiz-controls-top">
                        <button class="quiz-btn" style="height:60px; width:80px;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.handleInput('.')"><div class="quiz-input-dot"></div></button>
                        <button class="quiz-btn" style="height:60px; width:80px;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.handleInput('-')"><div class="quiz-input-dash"></div></button>
                        <button class="quiz-btn" style="height:60px; width:60px; border-color:var(--red); color:var(--red);" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.handleBackspace()">⌫</button>
                    </div>`;
                    contentHtml += `<p style="font-size:0.7rem; color:#777; margin:5px 0 0 0;">(المسافة: ضغطة قصيرة = نقطة، طويلة = شرطة)</p>`;
                    contentHtml += `<div class="quiz-controls" style="margin-top:10px;"><button class="action-btn btn-stats" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.checkInput()">تحقق</button></div>`;
                    this.inputBuffer = "";
                }
                const bottomControlsMargin = isCompact ? 'margin-top:5px;' : 'margin-top:10px;';
                contentHtml += `<div class="quiz-controls" style="${bottomControlsMargin} border-top:1px dashed #ccc; padding-top:5px; width:100%; justify-content:center;">
                    <button class="action-btn btn-hint" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.showHintModal()">💡 تلميح</button>
                    <button class="action-btn btn-giveup" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.giveUp()">🏳️ استسلم</button>
                    <button class="action-btn btn-reset" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.pauseGame()">⏸️ توقف</button>
                </div>`;
                const cardHtml = `<div class="quiz-card ${isCompact ? 'compact-mode' : ''}" id="quiz-card" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)">${contentHtml}</div>`;
                const remaining = this.state.roundRemaining.length;
                const statusHtml = `<div class="quiz-status" style="margin-top:5px;">باقي في الجولة: ${remaining}</div>`;
                container.innerHTML = cardHtml + statusHtml;
            },

            generateOptions: function(target, mode) {
                let distractors = stories.filter(s => s.char !== target.char).sort(() => 0.5 - Math.random()).slice(0, 3);
                let options = [target, ...distractors].sort(() => 0.5 - Math.random());
                return options.map(opt => {
                    let display = (mode === 'code') ? opt.seqStr.split('').map(c => c==='.'?'●':'▬').join(' ') : opt.char;
                    let style = (mode === 'code') ? 'direction:ltr !important;' : '';
                    return `<button class="quiz-btn" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="QuizManager.checkOption(this, '${opt.char}')" style="${style}" data-val="${opt.char}">${display}</button>`;
                }).join('');
            },

            showHintModal: function() {
                this.updateHintContent();
                document.getElementById('quiz-popup-overlay').style.display = 'flex';
            },

            nextHint: function() {
                this.hintStep++;
                this.updateHintContent();
            },
            
            closeHint: function() {
                document.getElementById('quiz-popup-overlay').style.display = 'none';
            },

            updateHintContent: function() {
                const t = this.state.currentQ.target;
                const content = document.getElementById('quiz-popup-inner');
                let hintHtml = '';
                if (this.hintStep === 0) {
                     hintHtml = `<div class="hint-text" style="font-size:1.2rem; padding:10px; line-height:1.6;">${t.text}</div>`;
                } else if (this.hintStep === 1) {
                     let iconSvg = art[t.icon] || art[t.char.toLowerCase()] || '...';
                     hintHtml = `<div style="width:120px; height:120px; margin:0 auto;">${iconSvg}</div>`;
                } else {
                     hintHtml = `<div style="width:100px; height:100px; margin:0 auto;">${letterGraphics[t.char]}</div>`;
                }

                let btnAction = 'QuizManager.nextHint()';
                let btnText = 'التلميح التالي ➡️';
                if (this.hintStep >= 2) {
                    btnAction = 'QuizManager.closeHint()';
                    btnText = 'إغلاق التلميح';
                }

                content.innerHTML = `
                    <div class="popup-close-btn" onmousedown="stopAllInteraction(event)" onclick="QuizManager.closeHint()">✕</div>
                    <h3 style="margin:0 0 10px 0; color:var(--accent); font-family:'Amiri';">تلميح ${this.hintStep + 1}/3 💡</h3>
                    ${hintHtml}
                    <button class="action-btn btn-hint" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="${btnAction}" style="margin-top:15px;">${btnText}</button>
                `;
            },

            pauseGame: function() {
                this.isActive = false; 
                const currentSessionTime = Date.now() - this.state.sessionStartTime;
                this.state.roundDurationAccumulated = (this.state.roundDurationAccumulated || 0) + currentSessionTime;
                this.state.sessionStartTime = 0; 
                this.save();
                const overlay = document.getElementById('quiz-pause-overlay');
                if(overlay) overlay.style.display = 'flex';
            },

            resumeGame: function() {
                this.isActive = true;
                this.state.sessionStartTime = Date.now();
                const overlay = document.getElementById('quiz-pause-overlay');
                if(overlay) overlay.style.display = 'none';
            },

            quitGame: function() {
                if (this.isActive) {
                    const currentSessionTime = Date.now() - this.state.sessionStartTime;
                    this.state.roundDurationAccumulated = (this.state.roundDurationAccumulated || 0) + currentSessionTime;
                    this.isActive = false;
                }
                this.save();
                const overlay = document.getElementById('quiz-pause-overlay');
                if(overlay) overlay.style.display = 'none';
                this.renderStartScreen();
            },

            giveUp: function() {
                const targetChar = this.state.currentQ.target.char;
                this.state.wrong[targetChar] = (this.state.wrong[targetChar] || 0) + 1;
                this.state.sessionWrong++;
                this.currentQuestionFailed = true;
                this.state.letterMistakes[targetChar] = (this.state.letterMistakes[targetChar] || 0) + 1;
                this.sessionMap[targetChar] = 'wrong';
                this.addToRecent(targetChar);
                this.save();
                const overlay = document.getElementById('quiz-popup-overlay');
                const content = document.getElementById('quiz-popup-inner');
                const target = this.state.currentQ.target;
                const codeHtml = target.seqStr.split('').map(c => c==='.'?'<div class="dot"></div>':'<div class="dash"></div>').join('');
                content.innerHTML = `
                    <h3 style="margin:0; color:var(--red); font-family:'Amiri';">الإجابة الصحيحة</h3>
                    <div class="popup-big-char">${target.char}</div>
                    <div class="popup-code">${codeHtml}</div>
                    <button class="action-btn btn-start" onmousedown="stopAllInteraction(event)" onclick="QuizManager.closePopupAndNext()" style="font-size:1.1rem; padding:10px 30px;">التالي ➡️</button>
                `;
                overlay.style.display = 'flex';
                playTone(200, 0.4, audioCtx.currentTime);
            },

            closePopupAndNext: function() {
                document.getElementById('quiz-popup-overlay').style.display = 'none';
                this.nextQuestion();
            },

            checkOption: function(btn, selectedChar) {
                const isCorrect = selectedChar === this.state.currentQ.target.char;
                this.finalizeAnswer(isCorrect, btn);
            },

            inputBuffer: "",
            handleInput: function(symbol, playSound = true) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if(this.inputBuffer.length < 5) {
                    this.inputBuffer += symbol;
                    this.updateInputDisplay();
                    if(playSound) {
                        let duration = (symbol === '.') ? dotDuration : (dotDuration * 3);
                        playTone(700, duration, audioCtx.currentTime);
                    }
                }
            },

            handleBackspace: function() {
                if(this.inputBuffer.length > 0) {
                    this.inputBuffer = this.inputBuffer.slice(0, -1);
                    this.updateInputDisplay();
                    playTone(400, 0.1, audioCtx.currentTime);
                }
            },

            updateInputDisplay: function() {
                const disp = document.getElementById('input-display');
                if(disp) {
                    disp.classList.remove('input-error', 'correct');
                    disp.innerHTML = this.inputBuffer.split('').map(c => c==='.'?'<div class="dot"></div>':'<div class="dash"></div>').join('');
                }
            },

            checkInput: function() {
                const isCorrect = this.inputBuffer === this.state.currentQ.target.seqStr;
                const card = document.getElementById('quiz-card');
                const inputArea = document.getElementById('input-display');
                if(!isCorrect && inputArea) inputArea.classList.add('input-error');
                else if(isCorrect && inputArea) inputArea.classList.add('correct');
                this.finalizeAnswer(isCorrect, card);
            },

            finalizeAnswer: function(isCorrect, element) {
                const targetChar = this.state.currentQ.target.char;
                this.addToRecent(targetChar);
                if (isCorrect) {
                    element.classList.add('correct');
                    playTone(880, 0.1, audioCtx.currentTime);
                    setTimeout(() => playTone(1760, 0.2, audioCtx.currentTime + 0.15), 100);
                    if (!this.sessionMap[targetChar]) this.sessionMap[targetChar] = 'correct';
                    if (!this.currentQuestionFailed) {
                        this.state.sessionCorrect++;
                        this.state.correct[targetChar] = true;
                        this.state.roundRemaining = this.state.roundRemaining.filter(c => c !== targetChar);
                    }

                    this.state.sessionTotal++; 
                    this.save();
                    setTimeout(() => {
                        if (this.state.roundRemaining.length === 0) this.finishRound();
                        else this.nextQuestion();
                    }, 1500);

                } else {
                    this.state.wrong[targetChar] = (this.state.wrong[targetChar] || 0) + 1;
                    this.sessionMap[targetChar] = 'wrong';
                    this.state.letterMistakes[targetChar] = (this.state.letterMistakes[targetChar] || 0) + 1;
                    if(!this.currentQuestionFailed) {
                        this.state.sessionWrong++;
                        this.currentQuestionFailed = true; 
                    }
                    element.classList.add('wrong');
                    playTone(150, 0.3, audioCtx.currentTime);
                    this.save();
                }
            },
            
            finishRound: function() {
                const currentSessionTime = Date.now() - this.state.sessionStartTime;
                const totalDuration = (this.state.roundDurationAccumulated || 0) + currentSessionTime;
                const now = new Date();
                const endDateStr = `${now.getHours()}:${now.getMinutes() < 10 ? '0'+now.getMinutes() : now.getMinutes()}`;
                this.state.history.push({
                    id: this.state.history.length + 1,
                    startDate: this.state.roundDateStart, 
                    endDate: endDateStr,
                    correct: 26, 
                    wrong: Object.values(this.state.letterMistakes).reduce((a, b) => a + b, 0), 
                    duration: totalDuration,
                    entries: this.state.roundSessions, 
                    status: "مكتمل"
                });

                this.state.roundRemaining = stories.map(s => s.char);
                this.state.letterMistakes = {};
                this.state.roundStartTime = 0;
                this.state.roundDateStart = null;
                this.state.roundDurationAccumulated = 0;
                this.state.roundSessions = 0;
                this.save();

                const overlay = document.getElementById('quiz-popup-overlay');
                const content = document.getElementById('quiz-popup-inner');
                content.innerHTML = `
                    <h2 style="color:var(--active-glow); font-family:'Amiri'; margin:0;">🎉 تهانينا! 🎉</h2>
                    <p style="font-size:1.2rem; margin:10px 0;">لقد أكملت الجولة كاملة بجميع الحروف!</p>
                    <div style="font-size:3rem;">🏆</div>
                    <button class="action-btn btn-start" onmousedown="stopAllInteraction(event)" onclick="QuizManager.closePopupAndNext()" style="font-size:1.1rem; padding:10px 30px;">ابدأ جولة جديدة</button>
                    <button class="action-btn btn-stats" onmousedown="stopAllInteraction(event)" onclick="QuizManager.showStats(); document.getElementById('quiz-popup-overlay').style.display='none';" style="margin-top:10px;">عرض النتائج</button>
                `;

                overlay.style.display = 'flex';
                playTone(523, 0.1, audioCtx.currentTime);
                setTimeout(() => playTone(659, 0.1, audioCtx.currentTime+0.1), 100);
                setTimeout(() => playTone(784, 0.1, audioCtx.currentTime+0.2), 200);
                setTimeout(() => playTone(1046, 0.4, audioCtx.currentTime+0.3), 300);
            },
            
            addToRecent: function(char) {
                if(!this.state.recentItems) this.state.recentItems = [];
                this.state.recentItems.push(char);
                if(this.state.recentItems.length > 6) this.state.recentItems.shift();
            },
            
            formatTime: function(ms) {
                if(!ms) return '0:00';
                const s = Math.floor(ms / 1000);
                const m = Math.floor(s / 60);
                const rs = s % 60;
                return `${m}:${rs < 10 ? '0'+rs : rs}`;
            },

            formatDate: function(ts) {
                if (!ts) return '-';
                const now = new Date(ts);
                return `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes() < 10 ? '0'+now.getMinutes() : now.getMinutes()}`;
            }
        };

        /* --- Numbers Quiz Logic Module --- */
        const NumbersQuizManager = {
            state: {
                correct: {}, 
                wrong: {},
                recentItems: [], 
                history: [], 
                currentQ: null,
                sessionCorrect: 0,
                sessionTotal: 0,
                sessionWrong: 0,
                sessionStartTime: 0,
                roundRemaining: [],
                roundStartTime: 0,
                roundDateStart: null, 
                roundSessions: 0,
                numberMistakes: {}, 
                roundDurationAccumulated: 0
            },

            currentQuestionFailed: false, 
            isActive: false, 
            isInputMode: false,
            hintStep: 0, 
            sessionMap: {}, 
            
            init: function() {
                const saved = localStorage.getItem('morseNumbersQuizState');
                if(saved) {
                    this.state = JSON.parse(saved);
                }

                if(!this.state.correct) this.state.correct = {};
                if(!this.state.wrong) this.state.wrong = {};
                if(!this.state.history) this.state.history = [];
                if(!this.state.recentItems) this.state.recentItems = [];
                if(!this.state.numberMistakes) this.state.numberMistakes = {};
                if(!this.state.roundRemaining || this.state.roundRemaining.length === 0) {
                     this.state.roundRemaining = numberStories.map(s => s.char);
                }
            },

            save: function() {
                localStorage.setItem('morseNumbersQuizState', JSON.stringify(this.state));
            },

            reset: function() {
                const remaining = this.state.roundRemaining ? this.state.roundRemaining.length : 10;
                const completed = 10 - remaining;
                const hasProgress = completed > 0 || (this.state.numberMistakes && Object.keys(this.state.numberMistakes).length > 0);

                if (hasProgress) {
                    let currentSessionTime = 0;
                    if (this.state.sessionStartTime > 0) {
                         currentSessionTime = Date.now() - this.state.sessionStartTime;
                    }
                    const totalDuration = (this.state.roundDurationAccumulated || 0) + currentSessionTime;
                    const endDate = new Date();
                    const endDateStr = `${endDate.getHours()}:${endDate.getMinutes() < 10 ? '0'+endDate.getMinutes() : endDate.getMinutes()}`;

                    this.state.history.push({
                        id: this.state.history.length + 1,
                        startDate: this.state.roundDateStart || this.formatDate(Date.now()),
                        endDate: endDateStr,
                        correct: completed,
                        wrong: Object.values(this.state.numberMistakes || {}).reduce((a, b) => a + b, 0),
                        duration: totalDuration,
                        entries: this.state.roundSessions,
                        status: "إعادة ضبط"
                    });
                }

                this.state.sessionCorrect = 0;
                this.state.sessionTotal = 0;
                this.state.sessionWrong = 0;
                this.state.correct = {};
                this.state.wrong = {};
                this.state.recentItems = [];
                this.state.roundRemaining = numberStories.map(s => s.char);
                this.state.numberMistakes = {};
                this.state.roundStartTime = 0;
                this.state.roundDateStart = null; 
                this.state.roundSessions = 0;
                this.state.roundDurationAccumulated = 0;
                this.sessionMap = {};
                this.save();
                this.renderStartScreen();
            },

            getNextQuestion: function() {
                if(!this.state.roundRemaining || this.state.roundRemaining.length === 0) {
                    this.state.roundRemaining = numberStories.map(s => s.char);
                }
                let candidates = numberStories.filter(s => this.state.roundRemaining.includes(s.char));
                const recentNumbers = this.state.recentItems || [];
                const availableCandidates = candidates.filter(s => !recentNumbers.includes(s.char));
                if (availableCandidates.length > 0) {
                    candidates = availableCandidates;
                }
                if (candidates.length === 0) candidates = numberStories;
                const target = candidates[Math.floor(Math.random() * candidates.length)];
                const type = Math.floor(Math.random() * 4);
                return { target, type };
            },

            renderStartScreen: function() {
                this.isActive = false;
                this.isInputMode = false;
                const container = document.getElementById('quiz-numbers-dynamic-content');
                if(!container) return;
                document.getElementById('quiz-numbers-card')?.classList.remove('compact-mode');
                const totalAnswered = numberStories.length - this.state.roundRemaining.length;
                const totalNumbers = numberStories.length;
                const percent = Math.round((totalAnswered / totalNumbers) * 100);
                const isRoundInProgress = this.state.roundRemaining.length < numberStories.length && this.state.roundRemaining.length > 0;
                const startBtnText = isRoundInProgress ? "تابع التمرين" : "ابداء تمارين الأرقام";

                container.innerHTML = `
                    <div class="quiz-title">اختبر معلوماتك في الأرقام</div>
                    <div class="quiz-status">تقدم الجولة: ${percent}% (${totalAnswered}/${totalNumbers})</div>
                    <div style="font-size: 4rem; margin: 10px;">🔢</div>
                    <div class="quiz-controls">
                        <button class="action-btn btn-start" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.startQuiz()">${startBtnText}</button>
                        <button class="action-btn btn-reset" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.reset()">إعادة الضبط (جولة جديدة)</button>
                        <button class="action-btn btn-stats" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.showStats()">عرض الإحصائيات</button>
                    </div>
                `;
            },

            showStats: function() {
                const container = document.getElementById('quiz-numbers-dynamic-content');
                let html = `<div class="quiz-title">إحصائيات الأرقام</div>`;
                html += `<h4 style="margin:5px 0; color:var(--blue);">أداء الأرقام (الجولة الحالية)</h4>`;
                html += `<div style="height:150px; overflow-y:auto; width:100%; border:1px solid #ccc; border-radius:5px;"><table class="stats-table"><tr><th>الرقم</th><th>الحالة</th><th>الأخطاء</th></tr>`;
                numberStories.forEach(s => {
                    let mistakes = this.state.numberMistakes[s.char] || 0;
                    let isRemaining = this.state.roundRemaining.includes(s.char);
                    let status = '⚪'; 
                    if (!isRemaining) {
                        status = (mistakes > 0) ? '⚠️' : '✅';
                    } else {
                        status = (mistakes > 0) ? '❌' : '⚪';
                    }
                    html += `<tr><td>${s.char}</td><td>${status}</td><td>${mistakes}</td></tr>`;
                });

                html += `</table></div>`;
                html += `<h4 style="margin:10px 0 5px 0; color:var(--red);">سجل جولات الأرقام</h4>`;
                html += `<div style="height:120px; overflow-y:auto; width:100%; border:1px solid #ccc; border-radius:5px;">
                    <table class="stats-table history-table">
                        <tr><th>#</th><th>البدء</th><th>الانتهاء</th><th>المدة</th><th>صح</th><th>خطأ</th></tr>`;
                if (this.state.roundRemaining.length < 10 || (this.state.numberMistakes && Object.keys(this.state.numberMistakes).length > 0)) {
                    let currentAddedTime = 0;
                    if (this.isActive && this.state.sessionStartTime > 0) {
                        currentAddedTime = Date.now() - this.state.sessionStartTime;
                    }

                    const totalCurrentDuration = (this.state.roundDurationAccumulated || 0) + currentAddedTime;
                    const currentCompleted = 10 - this.state.roundRemaining.length;
                    const currentMistakes = Object.values(this.state.numberMistakes).reduce((a, b) => a + b, 0);
                    const startDisp = this.state.roundDateStart ? this.state.roundDateStart.split(' ')[1] : 'الآن';
                    html += `<tr class="current-round-row"><td>*</td><td>${startDisp}</td><td style="color:var(--active-glow);">جاري...</td><td>${this.formatTime(totalCurrentDuration)}</td><td>${currentCompleted}/10</td><td>${currentMistakes}</td></tr>`;
                }

                [...this.state.history].reverse().forEach(h => {
                    const startTimeStr = h.startDate ? h.startDate.split(' ')[1] : '-';
                    html += `<tr><td>${h.id}</td><td>${startTimeStr}</td><td>${h.endDate}</td><td>${this.formatTime(h.duration)}</td><td>${h.correct}</td><td>${h.wrong}</td></tr>`;
                });

                html += `</table></div>`;
                html += `<div class="quiz-controls"><button class="action-btn btn-quit" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.renderStartScreen()">عودة</button></div>`;
                container.innerHTML = html;
            },

            startQuiz: function() {
                this.isActive = true;
                if (!this.state.roundRemaining || this.state.roundRemaining.length === 0) {
                    this.state.roundRemaining = numberStories.map(s => s.char);
                    this.state.roundStartTime = Date.now();
                    const now = new Date();
                    this.state.roundDateStart = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes() < 10 ? '0'+now.getMinutes() : now.getMinutes()}`;

                    this.state.roundDurationAccumulated = 0;
                    this.state.roundSessions = 0;
                    this.state.numberMistakes = {};
                } else if (!this.state.roundDateStart) {
                    const now = new Date();
                    this.state.roundDateStart = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${now.getMinutes() < 10 ? '0'+now.getMinutes() : now.getMinutes()}`;
                }

                this.state.sessionStartTime = Date.now();
                this.state.roundSessions = (this.state.roundSessions || 0) + 1;
                this.save();
                this.state.sessionCorrect = 0;
                this.state.sessionWrong = 0;
                this.state.sessionTotal = 0;
                this.sessionMap = {}; 
                this.nextQuestion();
            },

            nextQuestion: function() {
                this.resumeGame();
                this.currentQuestionFailed = false;
                this.hintStep = 0; 
                const q = this.getNextQuestion();
                this.state.currentQ = q;
                const container = document.getElementById('quiz-numbers-dynamic-content');
                this.isInputMode = (q.type === 3);
                let contentHtml = '';
                let isCompact = false;
                
                if (q.type === 0) { 
                    contentHtml += `<div class="quiz-question-text">اختر الشيفرة الصحيحة للرقم</div>`;
                    contentHtml += `<div class="quiz-big-char">${q.target.char}</div>`;
                    contentHtml += `<div class="quiz-options-grid">${this.generateOptions(q.target, 'code')}</div>`;
                } else if (q.type === 1) { 
                    contentHtml += `<div class="quiz-question-text">ما هو الرقم صاحب هذه الشيفرة؟</div>`;
                    contentHtml += `<div class="quiz-big-char" style="direction:ltr !important; font-size:4rem;">${q.target.seqStr}</div>`;
                    contentHtml += `<div class="quiz-options-grid">${this.generateOptions(q.target, 'number')}</div>`;
                } else if (q.type === 2) { 
                    contentHtml += `<div class="quiz-question-text">استمع واختر الرقم</div>`;
                    contentHtml += `<div class="audio-btn" style="position:relative; margin: 10px auto;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="playMorseSequence('${q.target.seqStr}', 'quiz-numbers-audio')"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></div>`;
                    contentHtml += `<div class="quiz-options-grid">${this.generateOptions(q.target, 'number')}</div>`;
                    setTimeout(() => playMorseSequence(q.target.seqStr, 'quiz-numbers-audio'), 500);
                } else if (q.type === 3) { 
                    isCompact = true; 
                    contentHtml += `<div class="quiz-question-text" style="margin-bottom:0;">اكتب شيفرة الرقم</div>`;
                    contentHtml += `<div class="quiz-big-char">${q.target.char}</div>`;
                    contentHtml += `<div class="quiz-input-area" id="numbers-input-display" style="direction:ltr !important;"></div>`;
                    contentHtml += `<div class="quiz-controls quiz-controls-top">
                        <button class="quiz-btn" style="height:60px; width:80px;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.handleInput('.')"><div class="quiz-input-dot"></div></button>
                        <button class="quiz-btn" style="height:60px; width:80px;" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.handleInput('-')"><div class="quiz-input-dash"></div></button>
                        <button class="quiz-btn" style="height:60px; width:60px; border-color:var(--red); color:var(--red);" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.handleBackspace()">⌫</button>
                    </div>`;
                    contentHtml += `<p style="font-size:0.7rem; color:#777; margin:5px 0 0 0;">(المسافة: ضغطة قصيرة = نقطة، طويلة = شرطة)</p>`;
                    contentHtml += `<div class="quiz-controls" style="margin-top:10px;"><button class="action-btn btn-stats" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.checkInput()">تحقق</button></div>`;
                    this.inputBuffer = "";
                }

                const bottomControlsMargin = isCompact ? 'margin-top:5px;' : 'margin-top:10px;';
                contentHtml += `<div class="quiz-controls" style="${bottomControlsMargin} border-top:1px dashed #ccc; padding-top:5px; width:100%; justify-content:center;">
                    <button class="action-btn btn-hint" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.showHintModal()">💡 تلميح</button>
                    <button class="action-btn btn-giveup" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.giveUp()">🏳️ استسلم</button>
                    <button class="action-btn btn-reset" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.pauseGame()">⏸️ توقف</button>
                </div>`;
                const cardHtml = `<div class="quiz-card ${isCompact ? 'compact-mode' : ''}" id="quiz-numbers-card" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)">${contentHtml}</div>`;
                const remaining = this.state.roundRemaining.length;
                const statusHtml = `<div class="quiz-status" style="margin-top:5px;">باقي في الجولة: ${remaining}</div>`;
                container.innerHTML = cardHtml + statusHtml;
            },

            generateOptions: function(target, mode) {
                let distractors = numberStories.filter(s => s.char !== target.char).sort(() => 0.5 - Math.random()).slice(0, 3);
                let options = [target, ...distractors].sort(() => 0.5 - Math.random());
                return options.map(opt => {
                    let display = (mode === 'code') ? opt.seqStr.split('').map(c => c==='.'?'●':'▬').join(' ') : opt.char;
                    let style = (mode === 'code') ? 'direction:ltr !important;' : '';
                    return `<button class="quiz-btn" onmousedown="stopAllInteraction(event)" ontouchstart="stopAllInteraction(event)" onclick="NumbersQuizManager.checkOption(this, '${opt.char}')" style="${style}" data-val="${opt.char}">${display}</button>`;
                }).join('');
            },

            showHintModal: function() {
                this.updateHintContent();

                    if(playSound) {

                        playTone(700, duration, audioCtx.currentTime);
                    }
                }

            finalizeAnswer: function(isCorrect, element) {
                const targetNumber = this.state.currentQ.target.char;
                this.addToRecent(targetNumber);
                if (isCorrect) {
                    element.classList.add('correct');
                    playTone(880, 0.1, audioCtx.currentTime);
                    setTimeout(() => playTone(1760, 0.2, audioCtx.currentTime + 0.15), 100);
                    if (!this.sessionMap[targetNumber]) this.sessionMap[targetNumber] = 'correct';
                    if (!this.currentQuestionFailed) {
                        this.state.sessionCorrect++;
                        this.state.correct[targetNumber] = true;
                        this.state.roundRemaining = this.state.roundRemaining.filter(c => c !== targetNumber);
                    }

                    this.state.sessionTotal++; 
                    this.save();
                    setTimeout(() => {
                        if (this.state.roundRemaining.length === 0) this.finishRound();
                        else this.nextQuestion();
                    }, 1500);

                } else {
                    this.state.wrong[targetNumber] = (this.state.wrong[targetNumber] || 0) + 1;
                    this.sessionMap[targetNumber] = 'wrong';
                    this.state.numberMistakes[targetNumber] = (this.state.numberMistakes[targetNumber] || 0) + 1;
                    if(!this.currentQuestionFailed) {
                        this.state.sessionWrong++;
                        this.currentQuestionFailed = true;

                    element.classList.add('wrong');

            function createCards(letters, type) {
                let containerClass = (type === 'pair' || type === 'single-inverse') ? 'inverse-view' : 'centered-view';
                let gridHtml = `<div class="family-scroll-container ${containerClass}"><div class="family-wrapper">`;

                if (type === 'pair') {

                        let code1 = '', code2 = '';
                        d1.seq.forEach(x => code1 += `<div class="${x.s === '.' ? 'dot' : 'dash'}"></div>`);
                        d2.seq.forEach(x => code2 += `<div class="${x.s === '.' ? 'dot' : 'dash'}"></div>`);
                        gridHtml += `<div class="family-card family-card-pair" onmousedown="stopAllInteraction(event)" onclick="stopAllInteraction(event)">

                                <div class="card-trace">${letterGraphics[char1]}</div><div class="card-code">${code1}</div>
                            </div><div class="pair-separator"></div>
                            <div id="family-side-${char2}" style="display:flex; flex-direction:column; align-items:center;">

                            </div></div>`;

                        gridHtml += `<div id="family-card-${char}" class="family-card" onmousedown="stopAllInteraction(event)" onclick="stopAllInteraction(event)">

                            <div class="card-trace">${letterGraphics[char]}</div><div class="card-code">${codeVisual}</div>
                        </div>`;
                    });

                gridHtml += '</div></div>';
                return gridHtml;

 window.playInteractiveWord = function(cat, wIdx, btnElement) {
            // التعديل الجذري: إيقاف أي صوت يعمل حالياً لتسريع الاستجابة
            if (window.stopAllAudioAndAnimations) {
                window.stopAllAudioAndAnimations();
            }
            
            isPlaying = true;
            window.currentWordPlaybackId = Date.now(); // إنشاء رقم جلسة جديد لقتل الأوامر المرئية السابقة
            const mySession = window.currentWordPlaybackId; // حفظ رقم الجلسة الحالية

            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // --- التمرير التلقائي للكلمة النشطة لتكون واضحة في منتصف الشاشة مع تأثير بصري جذاب ---
            const wordCard = document.getElementById(`word-card-${cat}-${wIdx}`);
            if (wordCard) {
                wordCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // إضافة تأثير بصري خفيف (نبضة) للبطاقة للتأكيد على اختيارها
                wordCard.style.transform = 'scale(1.02)';
                wordCard.style.borderColor = 'var(--active-glow)';
                wordCard.style.boxShadow = '0 8px 15px rgba(39, 174, 96, 0.2)';
                setTimeout(() => {
                    if (wordCard) {
                        wordCard.style.transform = 'scale(1)';
                        wordCard.style.borderColor = 'var(--blue)';
                        wordCard.style.boxShadow = '0 4px 6px rgba(0,0,0,0.05)';
                    }
                }, 600);
            }
            // ------------------------------------------------------------------

            btnElement.classList.add('playing');
            const w = wordCategories[cat][wIdx];
            const T = dotDuration;
            let startTime = audioCtx.currentTime;
            let visualEvents = [];
            let accumulatedTime = 0;

            w.codes.forEach((codeStr, letterIdx) => {
                // إضاءة أجزاء الحرف نفسه
                for(let i=0; i<codeStr.length; i++) {
                    let isDash = codeStr[i] === '-';
                    let duration = isDash ? T * 3 : T;
                    let elId = `led-${cat}-${wIdx}-${letterIdx}-${i}`;
                    
                    playTone(700, duration, startTime + accumulatedTime);
                    visualEvents.push({t: accumulatedTime, type: 'on', el: elId});
                    visualEvents.push({t: accumulatedTime + duration, type: 'off', el: elId});
                    
                    accumulatedTime += duration;
                    if (i < codeStr.length - 1) accumulatedTime += T; // صمت داخل الحرف
                }
                
                // إضاءة الفراغ بين الحروف (3 نقاط صمت)
                if (letterIdx < w.codes.length - 1) {
                    visualEvents.push({t: accumulatedTime, type: 'on', el: `ghost-${cat}-${wIdx}-${letterIdx}-0`});
                    visualEvents.push({t: accumulatedTime + T, type: 'off', el: `ghost-${cat}-${wIdx}-${letterIdx}-0`});
                    
                    visualEvents.push({t: accumulatedTime + T, type: 'on', el: `ghost-${cat}-${wIdx}-${letterIdx}-1`});
                    visualEvents.push({t: accumulatedTime + T*2, type: 'off', el: `ghost-${cat}-${wIdx}-${letterIdx}-1`});
                    
                    visualEvents.push({t: accumulatedTime + T*2, type: 'on', el: `ghost-${cat}-${wIdx}-${letterIdx}-2`});
                    visualEvents.push({t: accumulatedTime + T*3, type: 'off', el: `ghost-${cat}-${wIdx}-${letterIdx}-2`});
                    
                    accumulatedTime += T * 3;
                }
            });

            function sync() {
                // إذا تغير رقم الجلسة (تم النقر على زر آخر) أو توقف اللعب، اقتل الحلقة المرئية فوراً ونظف الإضاءة العالقة!
                if (!isPlaying || mySession !== window.currentWordPlaybackId) {
                    btnElement.classList.remove('playing');
                    visualEvents.forEach(e => {
                        const el = document.getElementById(e.el);
                        if (el) el.classList.remove('active');
                    });
                    return;
                }

                const now = audioCtx.currentTime - startTime;
                
                for (let i = 0; i < visualEvents.length; i++) {
                    const e = visualEvents[i];
                    if (!e.done && now >= e.t) {
                        const el = document.getElementById(e.el);
                        if (el) {
                            if (e.type === 'on') el.classList.add('active');
                            else el.classList.remove('active');
                        }
                        e.done = true;
                    }
                }

                if (now < accumulatedTime + 0.1) {
                    requestAnimationFrame(sync);
                } else {
                    isPlaying = false;
                    btnElement.classList.remove('playing');
                }
            }
            sync();
        };

        // دالة مساعدة لتوليد كود الشريط لتجنب التكرار (تدعم كتاب ونافذة)
        function generateTapeHtml(s, isModal, cat, sIdx) {
            let tapeHtml = '';

        window.closeSentenceModal = function(event) {
            if(event) { event.stopPropagation(); }
            
            window.killAllScheduledAudio();
            isPlaying = false; 
            
            const modal = document.getElementById('sentence-playback-modal');
            if(modal) modal.style.display = 'none';
